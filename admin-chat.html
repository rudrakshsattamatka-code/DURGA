<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DURGA - Admin Live Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1a1a2e; display: flex; height: 100vh; overflow: hidden; }
        
        .users-panel { width: 280px; background: #2a2a3e; display: flex; flex-direction: column; }
        .users-panel h3 { padding: 15px; background: linear-gradient(135deg, #e91e63, #9c27b0); color: #fff; font-size: 14px; }
        .users-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 12px; border-bottom: 1px solid #3a3a4e; cursor: pointer; transition: 0.2s; }
        .user-item:hover { background: #3a3a4e; }
        .user-item.active { background: #3a3a4e; border-left: 3px solid #e91e63; }
        .user-name { font-weight: bold; color: #fff; font-size: 14px; }
        .user-phone { font-size: 10px; color: #aaa; margin-top: 2px; }
        .last-msg { font-size: 10px; color: #888; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge { background: #e91e63; color: #fff; border-radius: 10px; padding: 2px 6px; font-size: 9px; margin-left: 8px; }
        
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: #2a2a3e; }
        .chat-header { padding: 15px; background: #1a1a2e; color: #fff; border-bottom: 1px solid #334155; }
        .chat-header .user-name { color: #e91e63; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 8px 12px; border-radius: 16px; font-size: 13px; word-wrap: break-word; }
        .user-msg { background: linear-gradient(135deg, #e91e63, #9c27b0); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .admin-msg { background: #1a1a2e; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e91e63; }
        .msg-time { font-size: 9px; margin-top: 4px; opacity: 0.7; }
        .msg-image { max-width: 200px; max-height: 200px; border-radius: 12px; margin-top: 5px; cursor: pointer; }
        
        .typing-indicator { padding: 8px 15px; font-size: 11px; color: #aaa; font-style: italic; background: #1a1a2e; }
        .input-area { padding: 12px 15px; background: #1a1a2e; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 10px 15px; border: 1px solid #3a3a4e; border-radius: 25px; background: #2a2a3e; color: #fff; outline: none; }
        .input-area input:focus { border-color: #e91e63; }
        .input-area button { background: linear-gradient(135deg, #e91e63, #9c27b0); color: #fff; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        .login-required { display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; }
        .login-card { background: #2a2a3e; padding: 30px; border-radius: 20px; text-align: center; }
        .login-card h3 { color: #e91e63; margin-bottom: 15px; }
        .login-card p { color: #aaa; margin-bottom: 20px; }
        .no-chat { text-align: center; color: #888; padding: 40px; }
        
        /* Image Modal */
        .image-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .image-modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .image-modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="adminChatContainer" style="display: flex; width: 100%; height: 100vh;">
        <div class="users-panel">
            <h3>🌸 Active Chat Users</h3>
            <div class="users-list" id="usersList"><div class="no-users" style="padding:20px;text-align:center;color:#888;">Loading...</div></div>
        </div>
        <div class="chat-panel">
            <div class="chat-header" id="chatHeader"><div style="text-align:center;color:#aaa;">Select a user to start chatting</div></div>
            <div class="chat-messages" id="chatMessages"><div class="no-chat">👈 Select a user from left panel</div></div>
            <div class="typing-indicator" id="typingIndicator" style="display: none;"></div>
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Type your reply..." onkeypress="if(event.key==='Enter') sendAdminMessage()">
                <button onclick="sendAdminMessage()">Send</button>
            </div>
        </div>
    </div>
    
    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <span class="image-modal-close">✕</span>
        <img id="modalImage" src="">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38",
            authDomain: "win777-ed482.firebaseapp.com",
            projectId: "win777-ed482",
            storageBucket: "win777-ed482.firebasestorage.app",
            messagingSenderId: "843686112399",
            appId: "1:843686112399:web:9c20a96831e6a94cd814fa"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let selectedUserId = null, selectedUserName = "", adminId = "admin_support";
        
        auth.onAuthStateChanged((user) => {
            if (!user) {
                if (window.parent && window.parent.sessionStorage) {
                    if (window.parent.sessionStorage.getItem('adminLoggedIn') === 'true') {
                        console.log("Admin session detected from parent");
                        loadUsers();
                        return;
                    }
                }
                document.body.innerHTML = `
                    <div class="login-required">
                        <div class="login-card">
                            <h3>🌸 Admin Access Required</h3>
                            <p>Please login to the Admin Panel first.</p>
                            <button onclick="window.parent.location.href='admin-panel.html'" style="background:#e91e63; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; color:#fff;">Go to Admin Panel</button>
                        </div>
                    </div>
                `;
            } else {
                console.log("Admin authenticated:", user.uid);
                loadUsers();
            }
        });
        
        function loadUsers() {
            db.collection('chats').orderBy('lastMessageTime', 'desc').onSnapshot((snapshot) => {
                const container = document.getElementById('usersList');
                if (snapshot.empty) {
                    container.innerHTML = '<div class="no-users" style="padding:20px;text-align:center;color:#888;">No active chats yet</div>';
                    return;
                }
                
                let html = '';
                snapshot.forEach(doc => {
                    const user = doc.data();
                    const hasUnread = user.unread === true;
                    const timeAgo = user.lastMessageTime?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || '';
                    
                    html += `
                        <div class="user-item ${selectedUserId === doc.id ? 'active' : ''}" onclick="selectUser('${doc.id}', '${escapeHtml(user.userName)}')">
                            <div class="user-name">
                                ${escapeHtml(user.userName)}
                                ${hasUnread ? '<span class="unread-badge">New</span>' : ''}
                            </div>
                            <div class="user-phone">${user.userPhone || 'No phone'}</div>
                            <div class="last-msg">💬 ${escapeHtml(user.lastMessage?.substring(0, 40) || 'No messages')}</div>
                            <div class="last-time" style="font-size:9px;color:#888;">${timeAgo}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }, (error) => {
                console.error("Error loading users:", error);
                document.getElementById('usersList').innerHTML = `<div class="no-users" style="padding:20px;text-align:center;color:#888;">Error: ${error.message}</div>`;
            });
        }
        
        function selectUser(userId, userName) {
            selectedUserId = userId;
            selectedUserName = userName;
            
            document.getElementById('chatHeader').innerHTML = `
                <div>
                    <span class="user-name">🌸 ${escapeHtml(userName)}</span>
                    <div class="user-phone" style="color:#aaa;font-size:11px;">Chatting with user</div>
                </div>
            `;
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('chatMessages').innerHTML = '<div class="no-chat" style="padding:20px;text-align:center;color:#888;">Loading messages...</div>';
            
            db.collection('chats').doc(userId).update({ unread: false });
            loadMessages();
            
            db.collection('chats').doc(userId).onSnapshot((doc) => {
                const typingDiv = document.getElementById('typingIndicator');
                if (doc.exists && doc.data().userTyping) {
                    typingDiv.innerHTML = '✍️ User is typing...';
                    typingDiv.style.display = 'block';
                } else {
                    typingDiv.style.display = 'none';
                }
            });
        }
        
        function loadMessages() {
            if (!selectedUserId) return;
            
            db.collection('chats').doc(selectedUserId).collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const container = document.getElementById('chatMessages');
                    if (snapshot.empty) {
                        container.innerHTML = '<div class="no-chat" style="padding:20px;text-align:center;color:#888;">No messages yet. Start the conversation!</div>';
                        return;
                    }
                    
                    let html = '';
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const isUser = msg.senderId !== adminId;
                        const time = msg.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || '';
                        
                        if (msg.type === 'image') {
                            html += `
                                <div class="message ${isUser ? 'user-msg' : 'admin-msg'}">
                                    <img src="${msg.imageUrl}" class="msg-image" onclick="showImageModal('${msg.imageUrl}')">
                                    <div class="msg-time">${time}</div>
                                </div>
                            `;
                        } else {
                            html += `
                                <div class="message ${isUser ? 'user-msg' : 'admin-msg'}">
                                    ${escapeHtml(msg.text)}
                                    <div class="msg-time">${time}</div>
                                </div>
                            `;
                        }
                    });
                    container.innerHTML = html;
                    container.scrollTop = container.scrollHeight;
                }, (error) => {
                    console.error("Error loading messages:", error);
                    container.innerHTML = `<div class="no-chat" style="padding:20px;text-align:center;color:#888;">Error loading messages</div>`;
                });
        }
        
        async function sendAdminMessage() {
            if (!selectedUserId) {
                alert('Please select a user first');
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            
            try {
                await db.collection('chats').doc(selectedUserId).collection('messages').add({
                    senderId: adminId,
                    senderName: 'Support Team',
                    text: text,
                    type: 'text',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    isAdmin: true
                });
                
                // FIXED: Set adminUnread to true so user dashboards instantly notice and trigger the live alert popup container metrics
                await db.collection('chats').doc(selectedUserId).update({
                    lastMessage: text,
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                    adminTyping: false,
                    adminUnread: true
                });
            } catch (error) {
                console.error("Error sending message:", error);
                alert("Error sending message: " + error.message);
            }
        }
        
        function showImageModal(url) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = url;
            modal.style.display = 'flex';
        }
        
        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
        
        // FIXED: Repaired the syntax crash inside the conditional replacement matrix sequence loop cleanly
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        let typingTimeout;
        const inputField = document.getElementById('messageInput');
        
        function setupTypingListener() {
            if (!inputField) return;
            inputField.addEventListener('input', () => {
                if (!selectedUserId) return;
                db.collection('chats').doc(selectedUserId).update({ adminTyping: true });
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    db.collection('chats').doc(selectedUserId).update({ adminTyping: false });
                }, 1000);
            });
        }
        
        setTimeout(setupTypingListener, 500);
        
        window.selectUser = selectUser;
        window.sendAdminMessage = sendAdminMessage;
        window.showImageModal = showImageModal;
        window.closeImageModal = closeImageModal;
    </script>
</body>
</html>
