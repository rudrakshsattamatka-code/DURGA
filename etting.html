<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DURGA - Place Bets</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f8f9fc; padding-bottom: 65px; }
        .app-container { max-width: 480px; margin: 0 auto; background: #f8f9fc; min-height: 100vh; }
        .header { background: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #eee; }
        .logo-img { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #e91e63; }
        .back-btn { background: none; border: none; font-size: 22px; color: #1a1a2e; cursor: pointer; width: 36px; }
        .market-title { font-size: 16px; font-weight: 700; color: #1a1a2e; flex: 1; text-align: center; }
        .bid-badge { background: linear-gradient(135deg, #e91e63, #9c27b0); color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .balance-card { background: linear-gradient(135deg, #1a1a2e, #16213e); margin: 12px; padding: 12px 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; }
        .balance-label { color: #aaa; font-size: 12px; }
        .balance-amount { color: #e91e63; font-size: 22px; font-weight: 700; }
        .game-selection-screen { padding: 12px; }
        .selection-title { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 5px; }
        .selection-subtitle { font-size: 12px; color: #888; margin-bottom: 15px; }
        .game-types-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .game-type-card { background: #fff; border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
        .game-type-card:hover { border-color: #e91e63; transform: translateY(-2px); }
        .game-icon { font-size: 32px; margin-bottom: 8px; }
        .game-card-name { font-size: 14px; font-weight: 700; color: #1a1a2e; }
        .game-card-rate { font-size: 12px; color: #e91e63; font-weight: 600; }
        .game-card-desc { font-size: 10px; color: #888; margin-top: 5px; }
        .bidding-panel { display: none; }
        .bidding-header { background: #fff; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .back-to-games { background: none; border: none; font-size: 20px; cursor: pointer; width: 36px; }
        .selected-game-title { font-size: 16px; font-weight: 700; flex: 1; }
        .selected-game-rate { background: linear-gradient(135deg, #e91e63, #9c27b0); padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; color: #fff; }
        .game-panel-content { background: #fff; margin: 12px; border-radius: 16px; padding: 15px; }
        .points-section { background: #f8f9fc; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .points-input { width: 100%; padding: 12px; background: #fff; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; }
        .points-input:focus { border-color: #e91e63; outline: none; }
        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; }
        .number-btn { background: #f8f9fc; border: 1px solid #ddd; border-radius: 12px; padding: 12px; text-align: center; font-size: 18px; font-weight: 700; cursor: pointer; }
        .number-btn.selected { background: linear-gradient(135deg, #e91e63, #9c27b0); color: #fff; border-color: #e91e63; }
        .jodi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; max-height: 240px; overflow-y: auto; }
        .jodi-btn { background: #f8f9fc; border: 1px solid #ddd; border-radius: 10px; padding: 8px; text-align: center; font-size: 12px; font-weight: 600; cursor: pointer; }
        .jodi-btn.selected { background: linear-gradient(135deg, #e91e63, #9c27b0); color: #fff; }
        .add-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #e91e63, #9c27b0); border: none; border-radius: 30px; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .bids-section { background: #f8f9fc; border-radius: 12px; margin: 15px 0; padding: 10px; max-height: 240px; overflow-y: auto; }
        .bid-item { background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .remove-bid { background: #ffe0e0; border: none; width: 28px; height: 28px; border-radius: 8px; color: #dc3545; cursor: pointer; font-size: 16px; }
        .summary-bar { background: #fff; margin: 12px; padding: 12px; border-radius: 16px; display: flex; justify-content: space-between; border: 1px solid #eee; }
        .summary-item { text-align: center; flex: 1; }
        .summary-label { font-size: 11px; color: #888; }
        .summary-value { font-size: 20px; font-weight: 700; color: #1a1a2e; }
        .submit-btn { width: calc(100% - 24px); margin: 12px; padding: 14px; background: linear-gradient(135deg, #e91e63, #9c27b0); border: none; border-radius: 30px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; }
        .submit-btn:disabled { opacity: 0.6; }
        .message { margin: 12px; padding: 10px; border-radius: 10px; font-size: 13px; text-align: center; }
        .error { background: #ffe0e0; color: #dc3545; }
        .success { background: #d4edda; color: #28a745; }
        .hidden { display: none; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: #fff; display: flex; justify-content: space-around; padding: 6px 8px; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: #888; cursor: pointer; font-size: 9px; flex: 1; }
        .nav-item:hover { color: #e91e63; }
        .nav-item img { width: 24px; height: 24px; display: block; margin: 0 auto 2px; opacity: 0.7; }
        .time-warning { background: #fff3cd; border-left: 3px solid #ff9800; padding: 10px; margin: 12px; border-radius: 10px; font-size: 12px; color: #856404; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header"><button class="back-btn" onclick="goBack()">←</button><img src="https://i.imgur.com/V4pMmxP.jpeg" alt="DURGA" class="logo-img"><div class="market-title" id="marketName">Loading...</div><div class="bid-badge" id="bidTypeBadge"></div></div>
    <div class="balance-card"><span class="balance-label">Your Balance</span><span class="balance-amount">₹<span id="userBalance">0</span></span></div>
    <div id="gameSelectionScreen" class="game-selection-screen"><div class="selection-title">🌸 Choose Game Type</div><div class="selection-subtitle">Select a game to start betting</div><div class="game-types-grid" id="gameTypesGrid"></div></div>
    <div id="biddingPanel" class="bidding-panel"><div class="bidding-header"><button class="back-to-games" onclick="showGameSelection()">←</button><div class="selected-game-title" id="selectedGameTitle">Single Digit</div><div class="selected-game-rate" id="selectedGameRate">10x</div></div><div id="timeWarning" class="time-warning hidden"></div><div id="gamePanel"></div><div class="summary-bar"><div class="summary-item"><div class="summary-label">Total Bids</div><div class="summary-value" id="totalBids">0</div></div><div class="summary-item"><div class="summary-label">Total Amount</div><div class="summary-value" id="totalPoints">₹0</div></div></div><button class="submit-btn" id="submitBtn" onclick="submitBids()">💰 PLACE BETS</button><div id="message" class="message hidden"></div></div>
</div>
<div class="bottom-nav"><div class="nav-item" onclick="location.href='dashboard.html'"><img src="https://i.imgur.com/StGZq3Y.png"><span>Home</span></div><div class="nav-item" onclick="location.href='mybids.html'"><img src="https://i.imgur.com/rUWwMYm.png"><span>Passbook</span></div><div class="nav-item" onclick="location.href='mybids.html'"><img src="https://i.imgur.com/QhfWXLI.jpeg"><span>Bids</span></div><div class="nav-item" onclick="location.href='funds.html'"><img src="https://i.imgur.com/NvJCTli.png"><span>Fund</span></div><div class="nav-item" onclick="location.href='chat.html'"><img src="https://i.imgur.com/ug9IprL.jpeg"><span>Support</span></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38", authDomain: "win777-ed482.firebaseapp.com", projectId: "win777-ed482", storageBucket: "win777-ed482.firebasestorage.app", messagingSenderId: "843686112399", appId: "1:843686112399:web:9c20a96831e6a94cd814fa" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // ========== LAST ACTIVE TRACKING ==========
    function updateLastActive() {
        if (auth.currentUser) {
            db.collection('users').doc(auth.currentUser.uid).update({
                lastActive: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(e => console.log("Last active update error:", e));
        }
    }
    setInterval(updateLastActive, 30000);
    updateLastActive();
    document.addEventListener('visibilitychange', () => { if (!document.hidden) updateLastActive(); });
    ['click', 'touchstart', 'scroll'].forEach(ev => document.addEventListener(ev, () => updateLastActive()));
    // ========== END LAST ACTIVE TRACKING ==========
    
    let currentUser=null, userData=null, currentMarket='', currentMarketId='', currentStatus='open', currentGameType='Single Digit', bids=[];
    let selectedDigits=[], selectedJodis=[];
    let marketOpenEndTime=null, marketCloseEndTime=null, isSubmitting=false;
    
    const gameRates = { 'Single Digit':10, 'Jodi':100, 'Single Pana':160, 'Double Pana':320, 'Triple Pana':1000, 'Half Sangam A':1000, 'Half Sangam B':1000, 'Full Sangam':10000 };
    const allGameTypes = [
        { name:'Single Digit', rate:10, availableInOpen:true, availableInClose:true },
        { name:'Jodi', rate:100, availableInOpen:true, availableInClose:false },
        { name:'Single Pana', rate:160, availableInOpen:true, availableInClose:true },
        { name:'Double Pana', rate:320, availableInOpen:true, availableInClose:true },
        { name:'Triple Pana', rate:1000, availableInOpen:true, availableInClose:true },
        { name:'Half Sangam A', rate:1000, availableInOpen:true, availableInClose:false },
        { name:'Half Sangam B', rate:1000, availableInOpen:true, availableInClose:false },
        { name:'Full Sangam', rate:10000, availableInOpen:true, availableInClose:false }
    ];
    const validSinglePanaList = ['128','137','146','236','245','290','380','470','489','560','579','678','129','138','147','156','237','246','345','390','480','570','589','679','120','139','148','157','238','247','256','346','490','580','670','689','130','149','158','167','239','248','257','347','356','590','680','789','140','159','168','230','249','258','267','348','357','456','690','780','123','150','169','178','240','259','268','349','358','367','457','790','124','160','278','179','250','269','340','359','368','458','467','890','125','134','170','189','260','279','350','369','468','378','459','567','126','135','180','234','270','289','360','379','450','469','478','568','127','136','145','190','235','280','370','389','460','479','569','578'];
    const validDoublePanaList = ['100','119','155','227','335','344','399','588','669','110','200','228','255','366','499','660','688','778','166','229','300','337','355','445','599','779','788','112','220','266','338','400','446','455','699','770','113','122','177','339','366','447','500','799','889','600','114','277','330','448','466','556','880','899','115','133','188','223','377','449','557','566','700','116','224','233','288','440','477','558','800','990','117','144','199','225','388','559','577','667','900','118','226','244','299','334','488','550','668','677'];
    const validTriplePanaList = ['111','222','333','444','555','666','777','888','999','000'];
    
    let currentPoints=null, selectedOpenClose='Open';
    let cachedServerTime=null, lastServerTimeFetch=0;
    
    async function getServerTime() {
        const now=Date.now();
        if(cachedServerTime && (now-lastServerTimeFetch)<5000){ const elapsed=(now-lastServerTimeFetch)/1000; return new Date(cachedServerTime.getTime()+(elapsed*1000)); }
        try{ const docRef=db.collection('settings').doc('servertime'); await docRef.set({timestamp:firebase.firestore.FieldValue.serverTimestamp()}); const doc=await docRef.get(); cachedServerTime=doc.data().timestamp.toDate(); lastServerTimeFetch=now; return cachedServerTime; } catch(e){ return cachedServerTime||new Date(); }
    }
    function timeToMinutes(t){ if(!t) return null; let [h,m]=t.split(':'); return parseInt(h)*60+parseInt(m); }
    async function isBettingAllowed(){
        const serverTime=await getServerTime();
        const currentMinutes=serverTime.getHours()*60+serverTime.getMinutes();
        if(currentStatus==='open' && marketOpenEndTime && currentMinutes>=marketOpenEndTime) return {allowed:false, message:'⚠️ Open bidding time over!'};
        if(currentStatus==='close' && marketCloseEndTime && currentMinutes>=marketCloseEndTime) return {allowed:false, message:'⚠️ Close bidding time over!'};
        return {allowed:true, message:null};
    }
    function getAvailableGameTypes(){ return currentStatus==='open' ? allGameTypes.filter(g=>g.availableInOpen) : allGameTypes.filter(g=>g.availableInClose); }
    function renderGameTypeSelection(){
        let types=getAvailableGameTypes();
        document.getElementById('gameTypesGrid').innerHTML=types.map(t=>`<div class="game-type-card" onclick="selectGameTypeFromCard('${t.name}')"><div class="game-icon">${t.name==='Single Digit'?'🔢':t.name==='Jodi'?'🔗':t.name==='Single Pana'?'🎲':t.name==='Double Pana'?'🎲🎲':t.name==='Triple Pana'?'🎲🎲🎲':t.name==='Half Sangam A'?'🔄':t.name==='Half Sangam B'?'🔄':'⭐'}</div><div class="game-card-name">${t.name}</div><div class="game-card-rate">${t.rate}x</div></div>`).join('');
    }
    async function selectGameTypeFromCard(type){
        const allowed=await isBettingAllowed();
        if(!allowed.allowed){ alert(allowed.message); return; }
        currentGameType=type; selectedDigits=[]; selectedJodis=[];
        document.getElementById('selectedGameTitle').innerHTML=currentGameType;
        document.getElementById('selectedGameRate').innerHTML=`${gameRates[currentGameType]}x`;
        document.getElementById('gameSelectionScreen').style.display='none';
        document.getElementById('biddingPanel').style.display='block';
        renderGamePanel();
    }
    function showGameSelection(){ document.getElementById('biddingPanel').style.display='none'; document.getElementById('gameSelectionScreen').style.display='block'; bids=[]; updateSummary(); }
    function getCurrentPoints(){ let pts=parseInt(document.getElementById('pointsInput')?.value); if(isNaN(pts) || pts<5){ alert('Minimum bid amount is ₹5'); return null; } currentPoints=pts; return pts; }
    function toggleDigit(d){ let idx=selectedDigits.indexOf(d); idx===-1?selectedDigits.push(d):selectedDigits.splice(idx,1); for(let i=0;i<=9;i++){ let btn=document.getElementById(`digit_${i}`); if(btn) btn.classList.toggle('selected',selectedDigits.includes(i.toString())); } }
    function toggleJodi(j){ let idx=selectedJodis.indexOf(j); idx===-1?selectedJodis.push(j):selectedJodis.splice(idx,1); for(let i=0;i<=99;i++){ let jodiStr=i.toString().padStart(2,'0'); let btn=document.getElementById(`jodi_${jodiStr}`); if(btn) btn.classList.toggle('selected',selectedJodis.includes(jodiStr)); } }
    async function addSelectedNumbers(){
        let allowed=await isBettingAllowed(); if(!allowed.allowed){ alert(allowed.message); return; }
        let pts=getCurrentPoints(); if(!pts) return;
        if(currentGameType==='Single Digit'){ if(!selectedDigits.length){ alert('Select at least one digit'); return; } selectedDigits.forEach(d=>addToBids(currentGameType,d,pts)); selectedDigits=[]; updateDigitButtons(); }
        else if(currentGameType==='Jodi'){ if(!selectedJodis.length){ alert('Select at least one Jodi'); return; } selectedJodis.forEach(j=>addToBids(currentGameType,j,pts)); selectedJodis=[]; updateJodiButtons(); }
        updateSummary(); renderGamePanel();
    }
    function addToBids(gameType,value,points){
        let bidType=(currentStatus==='close' && (gameType==='Single Digit'||gameType==='Single Pana'||gameType==='Double Pana'||gameType==='Triple Pana'))?'Close':'Open';
        let existing=bids.findIndex(b=>b.type===gameType && b.value===value && b.bidType===bidType);
        existing!==-1 ? bids[existing].points+=points : bids.push({type:gameType,bidType,value,points,market:currentMarket,marketId:currentMarketId});
        updateSummary(); renderGamePanel();
    }
    async function addManualNumber(){
        let allowed=await isBettingAllowed(); if(!allowed.allowed){ alert(allowed.message); return; }
        let pts=getCurrentPoints(); if(!pts) return;
        let val=document.getElementById('manualValue')?.value.trim();
        if(!val){ alert('Enter a number'); return; }
        if(currentGameType==='Single Pana' && !validSinglePanaList.includes(val)){ alert('Invalid Single Pana'); return; }
        if(currentGameType==='Double Pana' && !validDoublePanaList.includes(val)){ alert('Invalid Double Pana'); return; }
        if(currentGameType==='Triple Pana' && !validTriplePanaList.includes(val)){ alert('Invalid Triple Pana'); return; }
        addToBids(currentGameType,val,pts); document.getElementById('manualValue').value=''; updateSummary(); renderGamePanel();
    }
    async function addHalfSangamA(){
        let allowed=await isBettingAllowed(); if(!allowed.allowed){ alert(allowed.message); return; }
        let pts=getCurrentPoints(); if(!pts) return;
        let open=document.getElementById('halfSangamAOpen')?.value.trim(), close=document.getElementById('halfSangamAClose')?.value.trim();
        if(!open||!close){ alert('Enter both fields'); return; }
        addToBids(currentGameType,`${open}-${close}`,pts); document.getElementById('halfSangamAOpen').value=''; document.getElementById('halfSangamAClose').value=''; updateSummary(); renderGamePanel();
    }
    async function addHalfSangamB(){
        let allowed=await isBettingAllowed(); if(!allowed.allowed){ alert(allowed.message); return; }
        let pts=getCurrentPoints(); if(!pts) return;
        let open=document.getElementById('halfSangamBOpen')?.value.trim(), close=document.getElementById('halfSangamBClose')?.value.trim();
        if(!open||!close){ alert('Enter both fields'); return; }
        addToBids(currentGameType,`${open}-${close}`,pts); document.getElementById('halfSangamBOpen').value=''; document.getElementById('halfSangamBClose').value=''; updateSummary(); renderGamePanel();
    }
    async function addFullSangam(){
        let allowed=await isBettingAllowed(); if(!allowed.allowed){ alert(allowed.message); return; }
        let pts=getCurrentPoints(); if(!pts) return;
        let open=document.getElementById('fullSangamOpen')?.value.trim(), close=document.getElementById('fullSangamClose')?.value.trim();
        if(!open||!close){ alert('Enter both fields'); return; }
        addToBids(currentGameType,`${open}-${close}`,pts); document.getElementById('fullSangamOpen').value=''; document.getElementById('fullSangamClose').value=''; updateSummary(); renderGamePanel();
    }
    function renderBidItems(){
        if(!bids.length) return '<div class="bids-section" style="text-align:center;color:#888;">No bids added</div>';
        return `<div class="bids-section">${bids.map((b,i)=>`<div class="bid-item"><div><div class="bid-type">${b.type} ${b.bidType==='Open'?'(OPEN)':'(CLOSE)'}</div><div>${b.value}</div><div>₹${b.points} × ${gameRates[b.type]}x = ₹${b.points*gameRates[b.type]}</div></div><button class="remove-bid" onclick="removeBid(${i})">✕</button></div>`).join('')}</div>`;
    }
    function updateSummary(){ let total=bids.reduce((s,b)=>s+b.points,0); document.getElementById('totalBids').innerText=bids.length; document.getElementById('totalPoints').innerHTML=`₹${total}`; }
    function removeBid(i){ bids.splice(i,1); updateSummary(); renderGamePanel(); }
    function showMessage(msg,isError){ let d=document.getElementById('message'); d.innerText=msg; d.className=`message ${isError?'error':'success'}`; d.classList.remove('hidden'); setTimeout(()=>d.classList.add('hidden'),3000); }
    async function submitBids(){
        if(isSubmitting){ showMessage('Processing...',true); return; }
        if(!bids.length){ showMessage('No bids to place',true); return; }
        let allowed=await isBettingAllowed(); if(!allowed.allowed){ showMessage(allowed.message,true); return; }
        let total=bids.reduce((s,b)=>s+b.points,0);
        if(total<5){ showMessage('Minimum total ₹5',true); return; }
        let freshUser=await db.collection('users').doc(currentUser.uid).get();
        if((freshUser.data()?.balance||0)<total){ showMessage(`Insufficient balance! Need ₹${total}`,true); return; }
        isSubmitting=true; let btn=document.getElementById('submitBtn'); btn.disabled=true; btn.innerHTML='⏳ Processing...';
        try{
            let batch=db.batch();
            batch.update(db.collection('users').doc(currentUser.uid),{balance:(freshUser.data().balance||0)-total});
            for(let b of bids) batch.set(db.collection('bids').doc(),{userId:currentUser.uid,market:b.market,marketId:b.marketId,gameType:b.type,bidType:b.bidType,value:b.value,points:b.points,status:'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
            batch.set(db.collection('transactions').doc(),{userId:currentUser.uid,type:'debit',amount:total,status:'Completed',description:`Bid placed on ${currentMarket}`,date:firebase.firestore.FieldValue.serverTimestamp()});
            await batch.commit();
            userData.balance=(freshUser.data().balance||0)-total; document.getElementById('userBalance').innerText=userData.balance;
            showMessage(`✅ ₹${total} placed!`,false); bids=[]; updateSummary(); renderGamePanel();
        }catch(e){ showMessage('Error: '+e.message,true); }
        finally{ isSubmitting=false; btn.disabled=false; btn.innerHTML='💰 PLACE BETS'; }
    }
    function renderGamePanel(){
        let panel=document.getElementById('gamePanel');
        let rate=gameRates[currentGameType];
        if(currentGameType==='Single Digit'){
            let digits=''; for(let i=0;i<=9;i++) digits+=`<div class="number-btn ${selectedDigits.includes(i.toString())?'selected':''}" id="digit_${i}" onclick="toggleDigit('${i}')">${i}</div>`;
            panel.innerHTML=`<div class="game-panel-content"><div class="points-section"><input type="number" id="pointsInput" class="points-input" placeholder="Amount (Min ₹5)" oninput="updatePoints()"></div><div class="number-grid">${digits}</div><button class="add-btn" onclick="addSelectedNumbers()">➕ Add Selected (${selectedDigits.length})</button>${renderBidItems()}<div class="rate-info" style="text-align:center;margin-top:10px;font-size:11px;color:#888;">💰 Win ${rate}x</div></div>`;
        }
        else if(currentGameType==='Jodi'){
            let jodiHtml=''; for(let i=0;i<=99;i++){ let jodiStr=i.toString().padStart(2,'0'); jodiHtml+=`<div class="jodi-btn ${selectedJodis.includes(jodiStr)?'selected':''}" id="jodi_${jodiStr}" onclick="toggleJodi('${jodiStr}')">${jodiStr}</div>`; }
            panel.innerHTML=`<div class="game-panel-content"><div class="points-section"><input type="number" id="pointsInput" class="points-input" placeholder="Amount (Min ₹5)" oninput="updatePoints()"></div><div class="jodi-grid">${jodiHtml}</div><button class="add-btn" onclick="addSelectedNumbers()">➕ Add Selected (${selectedJodis.length})</button>${renderBidItems()}<div class="rate-info" style="text-align:center;margin-top:10px;font-size:11px;color:#888;">💰 Win ${rate}x</div></div>`;
        }
        else if(['Single Pana','Double Pana','Triple Pana'].includes(currentGameType)){
            panel.innerHTML=`<div class="game-panel-content"><div class="points-section"><input type="number" id="pointsInput" class="points-input" placeholder="Amount (Min ₹5)" oninput="updatePoints()"></div><div class="manual-entry"><input type="text" id="manualValue" placeholder="Enter 3-digit number" maxlength="3" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px;"></div><button class="add-btn" onclick="addManualNumber()">➕ Add to Bids</button>${renderBidItems()}<div class="rate-info" style="text-align:center;margin-top:10px;font-size:11px;color:#888;">💰 Win ${rate}x</div></div>`;
        }
        else if(currentGameType==='Half Sangam A'){
            panel.innerHTML=`<div class="game-panel-content"><div class="points-section"><input type="number" id="pointsInput" class="points-input" placeholder="Amount (Min ₹5)" oninput="updatePoints()"></div><input type="text" id="halfSangamAOpen" placeholder="Open Pana (3 digits)" maxlength="3" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:8px;"><input type="text" id="halfSangamAClose" placeholder="Close Digit (0-9)" maxlength="1" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px;"><button class="add-btn" onclick="addHalfSangamA()">➕ Add to Bids</button>${renderBidItems()}<div class="rate-info" style="text-align:center;margin-top:10px;font-size:11px;color:#888;">💰 Win ${rate}x</div></div>`;
        }
        else if(currentGameType==='Half Sangam B'){
            panel.innerHTML=`<div class="game-panel-content"><div class="points-section"><input type="number" id="pointsInput" class="points-input" placeholder="Amount (Min ₹5)" oninput="updatePoints()"></div><input type="text" id="halfSangamBOpen" placeholder="Open Digit (0-9)" maxlength="1" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:8px;"><input type="text" id="halfSangamBClose" placeholder="Close Pana (3 digits)" maxlength="3" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px;"><button class="add-btn" onclick="addHalfSangamB()">➕ Add to Bids</button>${renderBidItems()}<div class="rate-info" style="text-align:center;margin-top:10px;font-size:11px;color:#888;">💰 Win ${rate}x</div></div>`;
        }
        else if(currentGameType==='Full Sangam'){
            panel.innerHTML=`<div class="game-panel-content"><div class="points-section"><input type="number" id="pointsInput" class="points-input" placeholder="Amount (Min ₹5)" oninput="updatePoints()"></div><input type="text" id="fullSangamOpen" placeholder="Open Pana (3 digits)" maxlength="3" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:8px;"><input type="text" id="fullSangamClose" placeholder="Close Pana (3 digits)" maxlength="3" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px;"><button class="add-btn" onclick="addFullSangam()">➕ Add to Bids</button>${renderBidItems()}<div class="rate-info" style="text-align:center;margin-top:10px;font-size:11px;color:#888;">💰 Win ${rate}x</div></div>`;
        }
        if(document.getElementById('pointsInput') && currentPoints) document.getElementById('pointsInput').value=currentPoints;
    }
    function updatePoints(){ let pts=parseInt(document.getElementById('pointsInput')?.value); if(!isNaN(pts) && pts>=5) currentPoints=pts; }
    function updateDigitButtons(){ for(let i=0;i<=9;i++){ let btn=document.getElementById(`digit_${i}`); if(btn) btn.classList.toggle('selected',selectedDigits.includes(i.toString())); } }
    function updateJodiButtons(){ for(let i=0;i<=99;i++){ let jodiStr=i.toString().padStart(2,'0'); let btn=document.getElementById(`jodi_${jodiStr}`); if(btn) btn.classList.toggle('selected',selectedJodis.includes(jodiStr)); } }
    async function loadMarketData(){ let doc=await db.collection('markets').doc(currentMarketId).get(); if(doc.exists){ let d=doc.data(); marketOpenEndTime=timeToMinutes(d.openBidEnd); marketCloseEndTime=timeToMinutes(d.closeBidEnd); } }
    async function loadUserData(){ let user=auth.currentUser; if(!user){ location.href='index.html'; return; } currentUser=user; let doc=await db.collection('users').doc(user.uid).get(); userData=doc.data(); document.getElementById('userBalance').innerText=userData?.balance||0; }
    function goBack(){ location.href='dashboard.html'; }
    
    const urlParams=new URLSearchParams(window.location.search);
    currentMarket=decodeURIComponent(urlParams.get('market')||'Main Bazar');
    currentMarketId=urlParams.get('marketId')||'';
    currentStatus=urlParams.get('status')||'open';
    document.getElementById('marketName').innerHTML=currentMarket;
    document.getElementById('bidTypeBadge').innerHTML=currentStatus==='open'?'OPEN BIDDING':'CLOSE BIDDING';
    loadMarketData(); renderGameTypeSelection();
    
    window.selectGameTypeFromCard=selectGameTypeFromCard; window.showGameSelection=showGameSelection; window.addManualNumber=addManualNumber; window.removeBid=removeBid; window.addHalfSangamA=addHalfSangamA; window.addHalfSangamB=addHalfSangamB; window.addFullSangam=addFullSangam; window.submitBids=submitBids; window.updatePoints=updatePoints; window.toggleDigit=toggleDigit; window.toggleJodi=toggleJodi; window.addSelectedNumbers=addSelectedNumbers; window.goBack=goBack;
    auth.onAuthStateChanged(async user=>{ if(!user) location.href='index.html'; else await loadUserData(); });
</script>
</body>
</html>
