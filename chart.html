<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DURGA - Panel Charts</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background: #0f172a; color: #f8fafc; padding-bottom: 100px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; background: #0f172a; min-height: 100vh; padding: 16px; position: relative; display: flex; flex-direction: column; }
        
        /* Modern Compact Header Bar */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0 20px 0;
            background: #0f172a;
            flex-shrink: 0;
        }
        .back-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        
        /* DURGA Animated Color Title */
        .app-title {
            font-weight: 800; font-size: 20px; letter-spacing: 2px;
            background: linear-gradient(45deg, #3b82f6, #ef4444, #10b981, #f59e0b, #3b82f6);
            background-size: 400% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientShift 8s ease infinite;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .balance-pill {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 6px 14px;
            border-radius: 20px;
            color: #10b981;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }

        .section-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 4px 14px 4px; }

        /* Menu Selection List view container */
        .menu-list-wrapper { display: flex; flex-direction: column; gap: 10px; }
        .chart-list-item {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .chart-list-item:active { background: #1e293b80; }
        .market-info-box { display: flex; flex-direction: column; gap: 2px; }
        .market-name-label { font-size: 15px; font-weight: 700; color: #f8fafc; text-transform: capitalize; }
        .market-sub-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; }
        
        .action-arrow-indicator {
            width: 32px; height: 32px; background: #0f172a; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #3b82f6; font-size: 14px; font-weight: 700; border: 1px solid #334155;
        }

        /* Full Screen Embedded Chart Frame Container */
        .chart-frame-view {
            display: none;
            position: fixed;
            top: 60px; left: 0; right: 0; bottom: 75px;
            background: #0f172a;
            z-index: 900;
        }
        .embedded-chart-iframe {
            width: 100%; height: 100%; border: none;
            background: #ffffff;
        }

        /* Bottom Fixed Navigation Bar Matching Core Framework Layout */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; background: #1e293b; display: flex; justify-content: space-around; align-items: center; padding: 10px 6px 14px 6px; border-top: 1px solid #334155; z-index: 1000; height: 75px; }
        .nav-item { text-align: center; color: #94a3b8; cursor: pointer; font-size: 13px; flex: 1; font-weight: 600; text-decoration: none; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        .nav-item.active { color: #3b82f6; }
        .nav-item-home { position: relative; top: -20px; background: #3b82f6; color: #fff !important; width: 64px; height: 64px; max-width: 64px; border-radius: 50%; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4); border: 4px solid #0f172a; }
        .nav-item-home span { font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>
<div class="app-container">
    
    <!-- Thin App Bar Header Component -->
    <div class="app-header">
        <button class="back-btn" onclick="handleBackAction()">←</button>
        <span class="app-title" id="pageHeaderTitle">Panel Charts</span>
        <div class="balance-pill" onclick="showBalance()">₹<span id="userBalance">0</span></div>
    </div>
    
    <!-- Menu View Deck Elements -->
    <div id="menuListView">
        <div class="section-title">Select Market Record</div>
        <div class="menu-list-wrapper" id="chartMenuContainer">
            <!-- Programmatically Injected via Script -->
        </div>
    </div>

    <!-- Live Viewport Core Document Node -->
    <div class="chart-frame-view" id="chartFrameView">
        <iframe src="" class="embedded-chart-iframe" id="chartIframe"></iframe>
    </div>
    
    <!-- Unified Bottom Navigation Matrix Link Deck -->
    <div class="bottom-nav">
        <a href="chart.html" class="nav-item active"><span>Chart</span></a>
        <a href="mybids.html" class="nav-item"><span>My Bids</span></a>
        <a href="dashboard.html" class="nav-item nav-item-home"><span>Home</span></a>
        <a href="funds.html" class="nav-item"><span>Fund</span></a>
        <a href="chat.html" class="nav-item"><span>Support</span></a>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38", authDomain: "win777-ed482.firebaseapp.com", projectId: "win777-ed482", storageBucket: "win777-ed482.firebasestorage.app", messagingSenderId: "843686112399", appId: "1:843686112399:web:9c20a96831e6a94cd814fa" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentUserData = null;
    let isViewingChart = false;

    // Direct Parameterized Mapping Matrix for Panel Records Data
    const marketChartsData = [
        { name: "sridevi", url: "https://dpbossss.boston/panel-chart-record/sridevi.php#" },
        { name: "time bazar", url: "https://dpbossss.boston/panel-chart-record/time-bazar.php" },
        { name: "madhur day", url: "https://dpbossss.boston/panel-chart-record/madhur-day.php" },
        { name: "milan day", url: "https://dpbossss.boston/panel-chart-record/milan-day.php" },
        { name: "rajdhani day", url: "https://dpbossss.boston/panel-chart-record/rajdhani-day.php" },
        { name: "kalyan", url: "https://dpbossss.boston/panel-chart-record/kalyan.php" },
        { name: "sridevi night", url: "https://dpbossss.boston/panel-chart-record/sridevi-night.php" },
        { name: "madhur night", url: "https://dpbossss.boston/panel-chart-record/madhur-night.php" },
        { name: "milan night", url: "https://dpbossss.boston/panel-chart-record/milan-night.php" },
        { name: "rajdhani night", url: "https://dpbossss.boston/panel-chart-record/rajdhani-night.php" },
        { name: "kalyan night", url: "https://dpbossss.boston/panel-chart-record/kalyan-night.php" },
        { name: "main bazar", url: "https://dpbossss.boston/panel-chart-record/main-bazar.php" }
    ];

    function buildChartMenu() {
        const container = document.getElementById('chartMenuContainer');
        container.innerHTML = marketChartsData.map(m => `
            <div class="chart-list-item" onclick="openChartIframe('${m.url}', '${m.name}')">
                <div class="market-info-box">
                    <span class="market-name-label">${m.name}</span>
                    <span class="market-sub-label">Panel Chart History</span>
                </div>
                <div class="action-arrow-indicator">→</div>
            </div>
        `).join('');
    }

    function openChartIframe(url, name) {
        document.getElementById('chartIframe').src = url;
        document.getElementById('menuListView').style.display = 'none';
        document.getElementById('chartFrameView').style.display = 'block';
        document.getElementById('pageHeaderTitle').innerText = name.toUpperCase();
        isViewingChart = true;
    }

    function handleBackAction() {
        if (isViewingChart) {
            document.getElementById('chartIframe').src = "";
            document.getElementById('chartFrameView').style.display = 'none';
            document.getElementById('menuListView').style.display = 'block';
            document.getElementById('pageHeaderTitle').innerText = "Panel Charts";
            isViewingChart = false;
        } else {
            window.location.href = 'dashboard.html';
        }
    }

    async function loadUserData(){ 
        let doc=await db.collection('users').doc(auth.currentUser.uid).get(); 
        if(doc.exists){ 
            currentUserData=doc.data(); 
            document.getElementById('userBalance').innerText=currentUserData.balance||0; 
        } 
    }
    
    function showBalance(){ alert(`💰 Balance: ₹${currentUserData?.balance||0}`); }
    
    buildChartMenu();
    auth.onAuthStateChanged(async (user) => { 
        if (!user) window.location.href='index.html'; 
        else { await loadUserData(); } 
    });
</script>
</body>
</html>
