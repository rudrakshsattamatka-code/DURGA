<!DOCTYPE html>
<html lang="en">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f4f6f9; color: #334155; padding-top: 56px; padding-bottom: 75px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; background: #f4f6f9; min-height: 100vh; position: relative; display: flex; flex-direction: column; }
        
        /* Exact Image Match Premium Teal Top Header Bar */
        .sticky-top-panel {
            position: fixed; top: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto; height: 56px;
            background: linear-gradient(90deg, #136a7a, #1a8a9d); color: #fff; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
        }
        .back-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; display: flex; align-items: center; }
        .market-header-info { flex: 1; margin-left: 16px; display: flex; align-items: center; justify-content: space-between; }
        .market-meta-title { font-size: 16px; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px; }
        .balance-box-display { font-size: 15px; font-weight: 600; color: #ffffff; display: flex; align-items: center; gap: 6px; }
        .wallet-icon-svg { width: 18px; height: 18px; fill: currentColor; }

        /* Navigation Header Control Bar */
        .app-navigation-control-bar { display: flex; align-items: center; padding: 12px 16px; background: #f4f6f9; }
        .back-navigation-btn { background: none; border: none; color: #1a8a9d; font-size: 13px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .navigation-view-title { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.75px; margin-left: auto; }

        /* Game Grid Mode Content Views (Matching game type.jpeg) */
        .game-types-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 4px 16px 16px 16px; }
        .game-type-card { 
            background: #ffffff; border-radius: 18px; padding: 24px 12px; text-align: center; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); border: none; min-height: 110px;
        }
        .card-shape-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; }
        .icon-red { color: #dc2626; }
        .icon-green { color: #16a34a; }
        .icon-blue { color: #2563eb; }
        .icon-orange { color: #ea580c; }
        .icon-purple { color: #7c3aed; }
        .game-card-name { font-size: 14px; font-weight: 700; color: #1e293b; text-transform: capitalize; }
        .game-card-name.allcaps { text-transform: uppercase; font-weight: 900; }

        .bidding-panel { display: none; width: 100%; }

        /* Exact Layout Form Elements Matrix (Matching game style.jpeg) */
        .game-panel-content { padding: 4px 16px 10px 16px; display: flex; flex-direction: column; gap: 14px; }
        
        .native-image-row { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 16px; }
        .native-image-label { font-size: 15px; color: #475569; font-weight: 500; flex-shrink: 0; width: 120px; text-align: left; }
        
        .select-native-dropdown-wrapper { flex: 1; position: relative; background: #fff; border-radius: 8px; border: 1px solid #cbd5e1; padding-right: 12px; }
        .select-native-input { width: 100%; padding: 10px 12px; background: transparent; border: none; outline: none; font-size: 14px; font-weight: 700; color: #000; appearance: none; -webkit-appearance: none; cursor: pointer; text-transform: uppercase; }
        .select-native-dropdown-wrapper::after { content: '▼'; font-size: 10px; color: #475569; position: absolute; right: 12px; top: 14px; pointer-events: none; }

        .native-input-box-wrapper { flex: 1; background: #fff; border-radius: 8px; border: 1px solid #cbd5e1; }
        .native-form-input-field { width: 100%; padding: 10px 12px; background: transparent; border: none; outline: none; font-size: 15px; font-weight: 600; color: #000; }

        .native-add-more-btn { 
            align-self: flex-end; background: #1a8a9d; color: #fff; border: none; 
            padding: 10px 44px; border-radius: 20px; font-size: 16px; font-weight: 600; 
            cursor: pointer; margin-top: 4px; box-shadow: 0 2px 6px rgba(26,138,157,0.2);
        }

        /* Table Metadata Header List */
        .table-metadata-header-row { display: flex; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #cbd5e1; margin-top: 14px; background: #f4f6f9; }
        .meta-col-label { font-size: 13px; font-weight: 600; color: #1a8a9d; flex: 1; text-align: center; }
        .meta-col-label:first-child { text-align: left; }
        .meta-col-label:last-child { text-align: right; }

        /* Dynamic Scrollable Selection List Window Sheet */
        .isolated-scroll-bids-window { max-height: 200px; overflow-y: auto; border-bottom: 1px solid #cbd5e1; margin-bottom: 10px; }
        .bids-section { display: flex; flex-direction: column; }
        
        .bid-item { background: transparent; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .bid-info { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .bid-value { font-size: 14px; font-weight: 600; color: #334155; flex: 1; text-align: left; }
        .bid-points { font-size: 14px; color: #334155; font-weight: 600; flex: 1; text-align: center; }
        .bid-resolved-type-label { font-size: 14px; color: #334155; font-weight: 600; flex: 1; text-align: right; }
        .remove-bid { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding-left: 12px; font-weight: bold; }

        /* Dynamic Input Grid Displays */
        .digit-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 4px 16px; margin-bottom: 10px; }
        .digit-btn { background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px 0; text-align: center; font-size: 16px; font-weight: 700; color: #0f172a; cursor: pointer; }
        
        .jodi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 4px 16px; max-height: 220px; overflow-y: auto; margin-bottom: 10px; }
        .jodi-btn { background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; padding: 14px 0; text-align: center; font-size: 15px; font-weight: 700; color: #0f172a; cursor: pointer; }
        .jodi-btn.number-selected-active { background: #1a8a9d !important; color: #ffffff !important; border-color: #1a8a9d !important; }

        /* Fixed Bottom Summary Control Deck Bar (Matching game style.jpeg) */
        .fixed-bottom-summary-deck {
            position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
            background: #ffffff; border-top: 1px solid #cbd5e1; padding: 10px 20px 14px 24px; z-index: 1000;
            display: none; align-items: center; justify-content: space-between; height: 75px;
        }
        .summary-metrics-tray { display: flex; gap: 40px; }
        .summary-block { display: flex; flex-direction: column; align-items: center; }
        .summary-label { font-size: 14px; color: #475569; font-weight: 500; margin-bottom: 1px; }
        .summary-value { font-size: 16px; font-weight: 700; color: #000; }
        
        .submit-btn { 
            background: #136a7a; color: #fff; border: none; padding: 10px 44px; 
            border-radius: 20px; font-size: 16px; font-weight: 600; cursor: pointer; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .submit-btn:disabled { opacity: 0.5; }

        .message { text-align: center; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 600; margin: 8px 16px; }
        .error { background: #fee2e2; color: #b91c1c; }
        .success { background: #dcfce7; color: #15803d; }
    </style>
</head>
<body>
<div class="app-container">

        <button class="back-btn" onclick="handleNavigationHeaderBack()">←</button>
        <div class="market-header-info">

    <div id="gameSelectionScreen">

    </div>

        <div class="summary-metrics-tray">
            <div class="summary-block"><span class="summary-label">Bids</span><span class="summary-value" id="totalBidsSummaryLabel">0</span></div>
            <div class="summary-block"><span class="summary-label">Points</span><span class="summary-value" id="totalPointsSummaryLabel">0</span></div>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitBids()">Submit</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38", authDomain: "win777-ed482.firebaseapp.com", projectId: "win777-ed482", storageBucket: "win777-ed482.firebasestorage.app", messagingSenderId: "843686112399", appId: "1:843686112399:web:9c20a96831e6a94cd814fa" };

        ['120','125','157','170','256','260','567','670'], ['133','138','188','336','368','688'],
        ['134','139','148','189','346','369','468','689'], ['130','135','158','180','356','360','568','680'],
        ['144','149','199','446','469','699'], ['140','145','159','190','456','460','569','690'],
        ['100','150','155','556','560','600'], ['222','227','277','777'], ['223','228','237','278','377','778'],
        ['224','229','247','279','477','779'], ['220','225','257','270','577','770'], ['233','238','288','337','378','788'],
        ['234','239','248','289','347','379','478','789'], ['230','235','258','280','357','370','578','780'],
        ['244','249','299','447','479','799'], ['240','245','259','290','457','470','579','790'],
        ['200','250','255','557','570','700'], ['333','338','388','888'], ['334','339','348','389','488','889'],
        ['330','335','358','380','588','880'], ['344','349','399','448','489','899'], ['340','345','359','390','458','480','589','890'],

    ];

    const allGameTypes = [
        { name: 'Single Digit', availableInOpen: true, availableInClose: true, shape: '▪️', color: 'icon-red', isCaps: false },
        { name: 'Family Red Jodi', availableInOpen: true, availableInClose: false, shape: '⁜', color: 'icon-red', isCaps: true },
        { name: 'Jodi', availableInOpen: true, availableInClose: false, shape: '🎲', color: 'icon-green', isCaps: false },
        { name: 'Family Jodi', availableInOpen: true, availableInClose: false, shape: '🎲', color: 'icon-green', isCaps: true },
        { name: 'Single Pana', availableInOpen: true, availableInClose: true, shape: '♠', color: 'icon-blue', isCaps: false },
        { name: 'Family Pana', availableInOpen: true, availableInClose: true, shape: '♠', color: 'icon-blue', isCaps: true },
        { name: 'Double Pana', availableInOpen: true, availableInClose: true, shape: '♣', color: 'icon-orange', isCaps: false },
        { name: 'Half Sangam A', availableInOpen: true, availableInClose: false, shape: '▲', color: 'icon-orange', isCaps: true },
        { name: 'Triple Pana', availableInOpen: true, availableInClose: true, shape: '✦', color: 'icon-purple', isCaps: false },
        { name: 'Half Sangam B', availableInOpen: true, availableInClose: false, shape: '▼', color: 'icon-purple', isCaps: true },
        { name: 'Full Sangam', availableInOpen: true, availableInClose: false, shape: '✪', color: 'icon-green', isCaps: true }
    ];

    async function getServerTime() {
        const docRef = db.collection('settings').doc('servertime');
        await docRef.set({ timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        const doc = await docRef.get();
        return doc.data().timestamp.toDate();
    }

    async function isBettingAllowed() {
        if (currentStatus === 'holiday') return { allowed: false, message: '⚠️ Market Closed due to holiday.' };
        const serverTime = await getServerTime();
        const curMin = serverTime.getHours() * 60 + serverTime.getMinutes();
        if (currentStatus === 'open' && marketOpenEndTime && curMin >= marketOpenEndTime) return { allowed: false, message: '⚠️ Open bidding time is over.' };
        if (currentStatus === 'close' && marketCloseEndTime && curMin >= marketCloseEndTime) return { allowed: false, message: '⚠️ Market is now closed.' };
        return { allowed: true };
    }

    function timeToMinutes(t) { if (!t) return null; const p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]); }

    function renderGameTypeSelection() {
        const games = (currentStatus === 'open') ? allGameTypes.filter(g => g.availableInOpen) : allGameTypes.filter(g => g.availableInClose);
        document.getElementById('gameTypesGrid').innerHTML = games.map(g => `
            <div class="game-type-card" onclick="selectGame('${g.name}')">
                <span class="card-shape-icon ${g.color}">${g.shape}</span>
                <div class="game-card-name ${g.isCaps ? 'allcaps' : ''}">${g.name}</div>
            </div>
        `).join('');
    }

    async function selectGame(type) {
        const check = await isBettingAllowed(); if (!check.allowed) { showMsg(check.message, true); return; }
        currentGameType = type;
        document.getElementById('gameSelectionScreen').style.display = 'none';
        document.getElementById('biddingPanel').style.display = 'block';
        document.getElementById('bottomSummaryDeck').style.display = 'flex';
        document.getElementById('headerBackBtn').innerText = "← Games";
        document.getElementById('navViewTitleLabel').innerText = type;
        document.getElementById('marketNameTitle').innerText = `${currentMarket} - ${type}`;
        
        window.history.pushState({ inSubPanel: true }, "");
        renderPanel();
    }

    function showGameSelection() {
        document.getElementById('biddingPanel').style.display = 'none';
        document.getElementById('bottomSummaryDeck').style.display = 'none';
        document.getElementById('gameSelectionScreen').style.display = 'block';
        document.getElementById('headerBackBtn').innerText = "← Markets";
        document.getElementById('navViewTitleLabel').innerText = "Game Modes";
        document.getElementById('marketNameTitle').innerText = currentMarket;
        bids = []; updateSummary();
    }

    function handleNavigationHeaderBack() {
        const selectScreenVisibility = document.getElementById('gameSelectionScreen').style.display;
        if(selectScreenVisibility === 'none') {
            showGameSelection();
        } else {
            window.location.href = 'dashboard.html';
        }
    }

    window.addEventListener('popstate', function() {
        const selectScreenVisibility = document.getElementById('gameSelectionScreen').style.display;
        if (selectScreenVisibility === 'none') {
            showGameSelection();
        } else {
            window.location.href = 'dashboard.html';
        }
    });

    function detectExplicitPanaType(val) {
        if (validTriplePanaList.includes(val)) return 'Triple Pana';
        if (validDoublePanaList.includes(val)) return 'Double Pana';
        return 'Single Pana';
    }

    async function toggleJodiSelection(val, pts, element) {
        const check = await isBettingAllowed(); 
        if (!check.allowed) { alert(check.message); return; }
        if (!pts || pts < 5) { alert('Min ₹5 required'); return; }
        
        let targetType = 'Close';
        const index = bids.findIndex(b => b.type === 'Jodi' && b.value === val && b.bidType === targetType);
        
        if(index > -1) {
            bids.splice(index, 1);
            element.classList.remove('number-selected-active');
        } else {
            bids.push({ type: 'Jodi', gameType: 'Jodi', bidType: targetType, value: val, points: pts, market: currentMarket, marketId: currentMarketId });
            element.classList.add('number-selected-active');
        }
        updateSummary();
        document.getElementById('bidsContainerTargetBlock').innerHTML = renderBidsOnly();
    }

    async function addToBidsDirectly(resolvedGameType, val, pts) {
        const check = await isBettingAllowed(); 
        if (!check.allowed) { alert(check.message); return; }
        if (!pts || pts < 5) { alert('Min ₹5 required'); return; }
        
        let targetType = (['Single Digit', 'Single Pana', 'Double Pana', 'Triple Pana', 'Family Pana'].includes(resolvedGameType)) ? ((currentStatus === 'close') ? 'Close' : selectedOpenClose) : 'Close';

        const exists = bids.some(b => b.type === resolvedGameType && b.value === val && b.bidType === targetType);
        if(!exists) {
            bids.push({ type: resolvedGameType, gameType: resolvedGameType, bidType: targetType, value: val, points: pts, market: currentMarket, marketId: currentMarketId });
        }
        updateSummary(); renderPanel();
    }

    function handleAutoAddManualButton() {
        let v1El = document.getElementById('v1'); if(!v1El) return;
        const val = v1El.value.trim();
        const pts = parseInt(document.getElementById('pointsInput').value);
        if(isNaN(pts) || pts < 5) { alert('Min ₹5 required'); return; }
        if(!val) { alert('Please enter a valid number'); return; }

        if((currentGameType === 'Family Jodi' || currentGameType === 'Family Red Jodi') && val.length === 2) {
            let matchedFamily = familyJodiGroups.find(arr => arr.includes(val));
            if(matchedFamily) {
                matchedFamily.forEach(num => addToBidsDirectly('Jodi', num, pts));
                showMsg("✨ Family Jodi Added", false); v1El.value = ''; return;
            }
            let matchedRed = redJodiGroups.find(arr => arr.includes(val));
            if(matchedRed) {
                matchedRed.forEach(num => addToBidsDirectly('Jodi', num, pts));
                showMsg("✨ Red Family Group Added", false); v1El.value = ''; return;
            }
            addToBidsDirectly('Jodi', val, pts); v1El.value = '';
        } 
        else if(currentGameType === 'Family Pana' && val.length === 3) {
            let matchedPanaGroup = familyPanaGroups.find(arr => arr.includes(val));
            if(matchedPanaGroup) {
                matchedPanaGroup.forEach(num => {
                    let exactPanaType = detectExplicitPanaType(num);
                    addToBidsDirectly(exactPanaType, num, pts);
                });
                showMsg("✨ Pana Family Matrix Resolved", false); v1El.value = ''; return;
            }
            let exactPanaType = detectExplicitPanaType(val);
            addToBidsDirectly(exactPanaType, val, pts); v1El.value = '';
        }
        else if(['Single Pana', 'Double Pana', 'Triple Pana'].includes(currentGameType) && val.length === 3) {
            if(currentGameType==='Single Pana' && !validSinglePanaList.includes(val)){ alert('Invalid Single Pana'); return; }
            if(currentGameType==='Double Pana' && !validDoublePanaList.includes(val)){ alert('Invalid Double Pana'); return; }
            if(currentGameType==='Triple Pana' && !validTriplePanaList.includes(val)){ alert('Invalid Triple Pana'); return; }
            addToBidsDirectly(currentGameType, val, pts); v1El.value = '';
        } else {
            addToBidsDirectly(currentGameType, val, pts); v1El.value = '';
        }
    }

    function updateSummary() {
        document.getElementById('totalBidsSummaryLabel').innerText = bids.length;
        document.getElementById('totalPointsSummaryLabel').innerText = bids.reduce((s,b)=>s+b.points,0);
    }

    function removeBid(i) { bids.splice(i,1); updateSummary(); renderPanel(); }

    async function submitBids() {
        if (isSubmitting || bids.length === 0) return;
        const check = await isBettingAllowed(); if (!check.allowed) { showMsg(check.message, true); return; }
        const total = bids.reduce((s,b)=>s+b.points,0);
        const userDoc = await db.collection('users').doc(auth.currentUser.uid).get();
        const bal = userDoc.data().balance || 0;
        if (bal < total) { showMsg('Insufficient balance', true); return; }

        isSubmitting = true;
        const btn = document.getElementById('submitBtn'); btn.disabled = true;
        try {
            const batch = db.batch();
            batch.update(db.collection('users').doc(auth.currentUser.uid), { balance: bal - total });
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            bids.forEach(b => batch.set(db.collection('bids').doc(), { ...b, userId: auth.currentUser.uid, status: 'pending', createdAt: ts }));
            await batch.commit();
            document.getElementById('userBalance').innerText = (bal - total).toFixed(2);
            showMsg('Success!', false); bids = []; updateSummary(); renderPanel();
        } catch(e) { showMsg('Error', true); }
        finally { isSubmitting = false; btn.disabled = false; }
    }

    function renderPanel() {
        const p = document.getElementById('gamePanel');
        const pts = document.getElementById('pointsInput')?.value || '';
        
        let hasOpenClosePill = ['Single Digit', 'Single Pana', 'Double Pana', 'Triple Pana', 'Family Pana'].includes(currentGameType);
        
        let dropdownSelectionHeader = `
            ${hasOpenClosePill && currentStatus === 'open' ? `
            <div class="native-image-row">
                <span class="native-image-label">Select Game Type</span>
                <div class="select-native-dropdown-wrapper">
                    <select class="select-native-input" onchange="selectedOpenClose=this.value; renderPanel()">
                        <option value="Open" ${selectedOpenClose==='Open'?'selected':''}>${currentMarket} OPEN</option>
                        <option value="Close" ${selectedOpenClose==='Close'?'selected':''}>${currentMarket} CLOSE</option>
                    </select>
                </div>
            </div>` : ''}`;

        let labelStringText = currentGameType.includes('Pana') ? 'Single Pana' : (currentGameType.includes('Digit') ? 'Enter Digit' : 'Enter Number');

        if (currentGameType === 'Single Digit') {
            let grid = ''; for(let i=0;i<=9;i++) grid += `<div class="digit-btn" onclick="addToBidsDirectly('Single Digit', '${i}', parseInt(document.getElementById('pointsInput').value))">${i}</div>`;
            p.innerHTML = `
                <div class="game-panel-content">
                    ${dropdownSelectionHeader}
                    <div class="native-image-row"><span class="native-image-label">Enter Points</span><div class="native-input-box-wrapper"><input type="number" id="pointsInput" class="native-form-input-field" value="${pts||10}"></div></div>
                    <div class="digit-grid">${grid}</div>
                    ${renderTableWrapper()}
                </div>`;
        } else if (currentGameType === 'Jodi') {
            let grid = ''; 
            for(let i=0;i<=99;i++) { 
                let v = i.toString().padStart(2,'0'); 
                let isSelectedClass = bids.some(b => b.type === 'Jodi' && b.value === v) ? 'number-selected-active' : '';
                grid += `<div class="jodi-btn ${isSelectedClass}" onclick="toggleJodiSelection('${v}', parseInt(document.getElementById('pointsInput').value), this)">${v}</div>`; 
            }
            p.innerHTML = `
                <div class="game-panel-content">
                    ${dropdownSelectionHeader}
                    <div class="native-image-row"><span class="native-image-label">Enter Points</span><div class="native-input-box-wrapper"><input type="number" id="pointsInput" class="native-form-input-field" value="${pts||10}"></div></div>
                    <div class="jodi-grid">${grid}</div>
                    ${renderTableWrapper()}
                </div>`;
        } else if (currentGameType.includes('Sangam')) {
            let labels = currentGameType === 'Half Sangam A' ? ['Open Pana', 'Close Digit'] : (currentGameType === 'Half Sangam B' ? ['Open Digit', 'Close Pana'] : ['Open Pana', 'Close Pana']);
            p.innerHTML = `
                <div class="game-panel-content">
                    ${dropdownSelectionHeader}
                    <div class="native-image-row"><span class="native-image-label">${labels[0]}</span><div class="native-input-box-wrapper"><input type="number" id="v1" class="native-form-input-field"></div></div>
                    <div class="native-image-row"><span class="native-image-label">${labels[1]}</span><div class="native-input-box-wrapper"><input type="number" id="v2" class="native-form-input-field"></div></div>
                    <div class="native-image-row"><span class="native-image-label">Enter Points</span><div class="native-input-box-wrapper"><input type="number" id="pointsInput" class="native-form-input-field" value="${pts||10}"></div></div>
                    <button class="native-add-more-btn" onclick="addSangamPlacements()">Add More</button>
                    ${renderTableWrapper()}
                </div>`;
        } else {
            p.innerHTML = `
                <div class="game-panel-content">
                    ${dropdownSelectionHeader}
                    <div class="native-image-row"><span class="native-image-label">${labelStringText}</span><div class="native-input-box-wrapper"><input type="number" id="v1" class="native-form-input-field"></div></div>
                    <div class="native-image-row"><span class="native-image-label">Enter Points</span><div class="native-input-box-wrapper"><input type="number" id="pointsInput" class="native-form-input-field" value="${pts||10}"></div></div>
                    <button class="native-add-more-btn" onclick="handleAutoAddManualButton()">Add More</button>
                    ${renderTableWrapper()}
                </div>`;
        }
    }

    function renderTableWrapper() {
        let labelNameDisplay = currentGameType.includes('Pana') ? 'Single Pana' : (currentGameType.includes('Digit') ? 'Digit' : 'Number');
        return `
            <div class="table-metadata-header-row">
                <span class="meta-col-label" style="text-align: left;">${labelNameDisplay}</span>
                <span class="meta-col-label" style="text-align: center;">Points</span>
                <span class="meta-col-label" style="text-align: right;">Game Type</span>
            </div>
            <div class="isolated-scroll-bids-window">
                <div id="bidsContainerTargetBlock">${renderBidsOnly()}</div>
            </div>`;
    }

    function renderBidsOnly() { 
        return bids.length ? `<div class="bids-section">${bids.map((b,i)=>`
            <div class="bid-item">
                <div class="bid-info">
                    <span class="bid-value">${b.value}</span>
                    <span class="bid-points">${b.points}</span>
                    <span class="bid-resolved-type-label">${b.type}</span>
                </div>
                <button class="remove-bid" onclick="removeBid(${i})">✕</button>
            </div>`).join('')}</div>` : ''; 
    }
    
    function showMsg(m, e) { const d = document.getElementById('message'); d.innerText = m; d.className = `message ${e?'error':'success'}`; d.classList.remove('hidden'); setTimeout(()=>d.classList.add('hidden'), 2000); }
    function goBack() { window.location.href = 'dashboard.html'; }

    window.history.pushState({ inSelectionScreen: true }, "");

    const url = new URLSearchParams(window.location.search);
    currentMarket = decodeURIComponent(url.get('market') || 'Market');
    currentMarketId = url.get('marketId') || '';
    currentStatus = url.get('status') || 'open';
    document.getElementById('marketNameTitle').innerText = currentMarket;
    document.getElementById('bidTypeBadge').innerText = currentStatus.toUpperCase();

    db.collection('markets').doc(currentMarketId).get().then(d => {
        if(d.exists) {
            marketOpenEndTime = timeToMinutes(d.data().openBidEnd);
            marketCloseEndTime = timeToMinutes(d.data().closeBidEnd);
        }
    });

    auth.onAuthStateChanged(user => { if(!user) location.href='index.html'; else db.collection('users').doc(user.uid).get().then(d => { document.getElementById('userBalance').innerText = (d.data().balance || 0).toFixed(2); renderGameTypeSelection(); }); });
</script>
</body>
</html>
