    async function getServerTime() {
        const now = Date.now();
        if (cachedServerTime && (now - lastServerTimeFetch) < 5000) {
            const elapsed = (now - lastServerTimeFetch) / 1000;
            return new Date(cachedServerTime.getTime() + (elapsed * 1000));
        }
        try {
            const docRef = db.collection('settings').doc('servertime');
            await docRef.set({ timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            const doc = await docRef.get();
            cachedServerTime = doc.data().timestamp.toDate();
            lastServerTimeFetch = now;
            return cachedServerTime;
        } catch (error) {
            return cachedServerTime || new Date();
        }
    }
    
    async function isBettingAllowed() {
        const serverTime = await getServerTime();
        const currentMinutes = serverTime.getHours() * 60 + serverTime.getMinutes();
        
        if (currentStatus === 'open') {
            if (marketOpenEndTime && currentMinutes >= marketOpenEndTime) {
                return { allowed: false, message: '⚠️ Open bidding time is over! Please select CLOSE bidding if available.' };
            }
            return { allowed: true, message: null };
        } 
        else if (currentStatus === 'close') {

            }
            return { allowed: true, message: null };
        }
        return { allowed: true, message: null };

    function timeToMinutes(timeStr) {
        if (!timeStr) return null;
        const parts = timeStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);

                    <div class="game-card-badge">${badgeText}</div>
                </div>
            `;
        }).join('');
    }
    
    async function selectGameTypeFromCard(type) {
        const bettingAllowed = await isBettingAllowed();
        if (!bettingAllowed.allowed) {
            showMessage(bettingAllowed.message, true);
            return;
        }
        
        currentGameType = type;
        selectedDigits = [];
        selectedJodis = [];
        
        document.getElementById('selectedGameTitle').innerHTML = currentGameType;
        document.getElementById('selectedGameRate').innerHTML = `${gameRates[currentGameType]}x`;
        
        let bidTypeText = '';
        if (currentStatus === 'open') {
            bidTypeText = gameBadges[currentGameType]?.open || 'OPEN BID';
        } else {
            bidTypeText = gameBadges[currentGameType]?.close || 'CLOSE BID';
        }
        document.getElementById('selectedGameBidType').innerHTML = bidTypeText;
        
        document.getElementById('gameSelectionScreen').style.display = 'none';
        document.getElementById('biddingPanel').style.display = 'block';
        renderGamePanel();
        updateTimeWarning();
        
        if (window.timeCheckInterval) clearInterval(window.timeCheckInterval);
        window.timeCheckInterval = setInterval(async () => {
            const allowed = await isBettingAllowed();
            if (!allowed.allowed) {
                updateTimeWarning();
            }
        }, 5000);
    }
    
    function showGameSelection() {
        if (window.timeCheckInterval) clearInterval(window.timeCheckInterval);
        document.getElementById('biddingPanel').style.display = 'none';
        document.getElementById('gameSelectionScreen').style.display = 'block';
        bids = [];
        updateSummary();
    }
    
    function updatePoints() {
        const pointsInput = document.getElementById('pointsInput');
        if (pointsInput) {
            let pts = parseInt(pointsInput.value);
            if (isNaN(pts)) pts = null;
            currentPoints = pts;
        }
    }
    
    function getCurrentPoints() {
        const pointsInput = document.getElementById('pointsInput');
        if (pointsInput) {
            let pts = parseInt(pointsInput.value);
            if (isNaN(pts) || pts === '' || pts === null) {
                alert('Please enter points amount');
                return null;
            }
            if (pts < 5) {
                alert('⚠️ Minimum bid amount is ₹5. Please enter ₹5 or more.');
                return null;
            }
            currentPoints = pts;
            return currentPoints;
        }
        return null;
    }
    
    function toggleDigit(digit) {
        const index = selectedDigits.indexOf(digit);
        if (index === -1) selectedDigits.push(digit);
        else selectedDigits.splice(index, 1);
        updateDigitButtons();
    }
    
    function updateDigitButtons() {
        for(let i = 0; i <= 9; i++) {
            const btn = document.getElementById(`digit_${i}`);
            if(btn) {
                if(selectedDigits.includes(i.toString())) btn.classList.add('selected');
                else btn.classList.remove('selected');
            }
        }
    }
    
    function toggleJodi(jodi) {
        const index = selectedJodis.indexOf(jodi);
        if (index === -1) selectedJodis.push(jodi);
        else selectedJodis.splice(index, 1);
        updateJodiButtons();
    }
    
    function updateJodiButtons() {
        for(let i = 0; i <= 99; i++) {
            const jodiStr = i.toString().padStart(2, '0');
            const btn = document.getElementById(`jodi_${jodiStr}`);
            if(btn) {
                if(selectedJodis.includes(jodiStr)) btn.classList.add('selected');
                else btn.classList.remove('selected');
            }
        }
    }
    
    async function addSelectedNumbers() {
        const bettingAllowed = await isBettingAllowed();
        if (!bettingAllowed.allowed) {
            showMessage(bettingAllowed.message, true);
            return;
        }
        
        const points = getCurrentPoints();
        if(points === null) return;
        
        if(currentGameType === 'Single Digit') {
            if(selectedDigits.length === 0) { alert('Please select at least one digit'); return; }
            for(const digit of selectedDigits) addToBids(currentGameType, digit, points);
            selectedDigits = [];
            updateDigitButtons();
        } 
        else if(currentGameType === 'Jodi') {
            if(selectedJodis.length === 0) { alert('Please select at least one Jodi'); return; }
            for(const jodi of selectedJodis) addToBids(currentGameType, jodi, points);
            selectedJodis = [];
            updateJodiButtons();
        }
        updateSummary();
        renderGamePanel();
    }
    
    function addToBids(gameType, value, points) {
        let bidTypeValue = null;
        
        if (gameType === 'Single Digit' || gameType === 'Single Pana' || gameType === 'Double Pana' || gameType === 'Triple Pana') {
            bidTypeValue = (currentStatus === 'close') ? 'Close' : 'Open';
        } else {
            bidTypeValue = 'Close';
        }
        
        const existingIndex = bids.findIndex(b => 
            b.type === gameType && 
            b.value === value && 
            b.bidType === bidTypeValue
        );
        
        if (existingIndex !== -1) {
            bids[existingIndex].points += points;
        } else {
            bids.push({ 
                type: gameType, 
                bidType: bidTypeValue, 
                value: value, 
                points: points, 
                market: currentMarket, 
                marketId: currentMarketId 
            });
        }
        
        updateSummary();
        renderGamePanel();
    }
    
    async function addManualNumber() {
        const bettingAllowed = await isBettingAllowed();
        if (!bettingAllowed.allowed) {
            showMessage(bettingAllowed.message, true);
            return;
        }
        
        const points = getCurrentPoints();
        if(points === null) return;
        const value = document.getElementById('manualValue')?.value.trim();
        if(!value) { alert('Please enter a number'); return; }
        
        if(currentGameType === 'Single Pana' && !validSinglePanaList.includes(value)) { alert('❌ Invalid Single Pana!'); return; }
        if(currentGameType === 'Double Pana' && !validDoublePanaList.includes(value)) { alert('❌ Invalid Double Pana!'); return; }
        if(currentGameType === 'Triple Pana' && !validTriplePanaList.includes(value)) { alert('❌ Invalid Triple Pana!'); return; }
        if(currentGameType === 'Half Sangam A' && !/^\d{3}-\d$/.test(value)) { alert('❌ Invalid Half Sangam A format!\n\nFormat: 123-5'); return; }
        if(currentGameType === 'Half Sangam B' && !/^\d-\d{3}$/.test(value)) { alert('❌ Invalid Half Sangam B format!\n\nFormat: 5-123'); return; }
        if(currentGameType === 'Full Sangam' && !/^\d{3}-\d{3}$/.test(value)) { alert('❌ Invalid Full Sangam format!\n\nFormat: 123-456'); return; }
        
        addToBids(currentGameType, value, points);
        document.getElementById('manualValue').value = '';
        updateSummary();
        renderGamePanel();
    }
    
    async function addHalfSangamA() {
        const bettingAllowed = await isBettingAllowed();
        if (!bettingAllowed.allowed) {
            showMessage(bettingAllowed.message, true);
            return;
        }
        
        const points = getCurrentPoints();
        if(points === null) return;
        const open = document.getElementById('halfSangamAOpen')?.value.trim();
        const close = document.getElementById('halfSangamAClose')?.value.trim();
        if(!open || !close) { alert('Please enter both fields'); return; }
        if(open.length !== 3 || !/^\d{3}$/.test(open)) { alert('Open Pana must be 3 digits'); return; }
        if(close.length !== 1 || !/^\d$/.test(close)) { alert('Close Digit must be 0-9'); return; }
        addToBids(currentGameType, `${open}-${close}`, points);
        document.getElementById('halfSangamAOpen').value = '';
        document.getElementById('halfSangamAClose').value = '';
        updateSummary();
        renderGamePanel();
    }
    
    async function addHalfSangamB() {

        if (!bettingAllowed.allowed) {
            showMessage(bettingAllowed.message, true);

        const points = getCurrentPoints();
        if(points === null) return;

        const close = document.getElementById('halfSangamBClose')?.value.trim();
        if(!open || !close) { alert('Please enter both fields'); return; }
        if(open.length !== 1 || !/^\d$/.test(open)) { alert('Open Digit must be 0-9'); return; }

        addToBids(currentGameType, `${open}-${close}`, points);
        document.getElementById('halfSangamBOpen').value = '';

        const bettingAllowed = await isBettingAllowed();

            showMessage(bettingAllowed.message, true);

        if(points === null) return;

    function renderBidItems() {
        if(bids.length === 0) return '<div class="bids-section" style="text-align:center; color:#6c757d;">No bids added yet</div>';
        return `<div class="bids-section">${bids.map((b,i)=>`
            <div class="bid-item">
                <div class="bid-info">
                    <div class="bid-type">${b.type} ${b.bidType === 'Open' ? '(OPEN)' : '(CLOSE)'}</div>
                    <div class="bid-value">${b.value}</div>
                    <div class="bid-points">₹${b.points} × ${gameRates[b.type] || 10}x = ₹${b.points * (gameRates[b.type] || 10)}</div>
                </div>
                <button class="remove-bid" onclick="removeBid(${i})">✕</button>
            </div>
        `).join('')}</div>`;
    }
    
    function updateSummary() {
        const total = bids.reduce((s,b)=>s+b.points,0);
        document.getElementById('totalBids').innerText = bids.length;
        document.getElementById('totalPoints').innerHTML = `₹${total}`;
    }
    
    function removeBid(i) { 
        bids.splice(i,1); 
        updateSummary(); 
        renderGamePanel(); 
    }
    
    function showMessage(msg, isError) {
        const d = document.getElementById('message');
        d.innerText = msg;
        d.className = `message ${isError ? 'error' : 'success'}`;
        d.classList.remove('hidden');
        setTimeout(() => d.classList.add('hidden'), 3000);
    }
    
    async function submitBids() {
        if(isSubmitting) {
            showMessage('Please wait, processing...', true);
            return;
        }
        if(bids.length === 0) { showMessage('No bids to place', true); return; }
        if(!currentUser) return;
        
        const bettingAllowed = await isBettingAllowed();
        if (!bettingAllowed.allowed) {
            showMessage(bettingAllowed.message, true);
            return;
        }
        
        const total = bids.reduce((sum, bid) => sum + bid.points, 0);
        
        if (total < 5) {
            showMessage('⚠️ Minimum total bid amount is ₹5. Please add more bids.', true);
            return;
        }
        
        const freshUserDoc = await db.collection('users').doc(currentUser.uid).get();
        const currentBalance = freshUserDoc.data()?.balance || 0;
        
        if(currentBalance < total) { 
            showMessage(`Insufficient balance! Need ₹${total}. Your balance: ₹${currentBalance}`, true); 
            return; 
        }
        
        isSubmitting = true;
        const submitBtn = document.getElementById('submitBtn');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span class="loading-spinner"></span> Processing...';
        submitBtn.disabled = true;
        
        const newBalance = currentBalance - total;
        const timestamp = firebase.firestore.FieldValue.serverTimestamp();
        
        try {
            const batch = db.batch();
            const userRef = db.collection('users').doc(currentUser.uid);
            batch.update(userRef, { balance: newBalance });
            
            for(let b of bids) {
                const bidRef = db.collection('bids').doc();
                batch.set(bidRef, {
                    userId: currentUser.uid,
                    market: b.market,
                    marketId: b.marketId,
                    gameType: b.type,
                    bidType: b.bidType,
                    value: b.value,
                    points: b.points,
                    status: 'pending',
                    createdAt: timestamp
                });
            }
            
            const transactionRef = db.collection('transactions').doc();
            batch.set(transactionRef, {
                userId: currentUser.uid,
                type: 'debit',
                amount: total,
                status: 'Completed',
                description: `Bid placed on ${currentMarket} (${bids.length} bids)`,
                date: timestamp
            });
            
            await batch.commit();
            
            userData.balance = newBalance;
            document.getElementById('userBalance').innerText = newBalance;
            
            showMessage(`✅ ₹${total} bids placed successfully!`, false);
            
            bids = [];
            updateSummary();
            renderGamePanel();
            
        } catch(e) { 
            console.error("Submit error:", e);
            showMessage('Error: ' + e.message, true);
        } finally {
            isSubmitting = false;
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    }

        selectedOpenClose = value; 
        renderGamePanel(); 
    }

                    <div class="rate-info">Win ${rate}x your bid amount</div>

        }
        else if(currentGameType === 'Single Pana' || currentGameType === 'Double Pana' || currentGameType === 'Triple Pana') {
            panel.innerHTML = `
                <div class="game-panel-content">
                    ${showOpenClose && currentStatus === 'open' && !isCloseOnlyGame ? `
                    <div class="toggle-section">
                        <label class="toggle-option"><input type="radio" name="openClose" value="Open" ${selectedOpenClose === 'Open' ? 'checked' : ''} onchange="setOpenClose('Open')"> Open</label>
                        <label class="toggle-option"><input type="radio" name="openClose" value="Close" ${selectedOpenClose === 'Close' ? 'checked' : ''} onchange="setOpenClose('Close')"> Close</label>
                    </div>` : showOpenClose && currentStatus === 'close' ? '<div class="toggle-section"><span>Close Only Bidding</span></div>' : ''}
                    <div class="points-section">
                        <label class="points-label">Bid Amount (₹)</label>
                        <input type="number" id="pointsInput" class="points-input" placeholder="Enter amount (Min ₹5)" step="1" onchange="updatePoints()" oninput="updatePoints()" inputmode="numeric">

                    </div>

                        <label class="points-label">Bid Amount (₹)</label>

    async function loadMarketData() {
        const marketDoc = await db.collection('markets').doc(currentMarketId).get();

            const data = marketDoc.data();
            marketOpenEndTime = timeToMinutes(data.openBidEnd);
            marketCloseEndTime = timeToMinutes(data.closeBidEnd);
        }
    }
    
    async function loadUserData() {
        const user = auth.currentUser;
        if(!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        const doc = await db.collection('users').doc(user.uid).get();
        userData = doc.data();
        document.getElementById('userBalance').innerText = userData?.balance || 0;
    }
    
    function goBack() { window.location.href = 'dashboard.html'; }
    
    const urlParams = new URLSearchParams(window.location.search);
    currentMarket = decodeURIComponent(urlParams.get('market') || 'Main Bazar');
    currentMarketId = urlParams.get('marketId') || '';
    currentStatus = urlParams.get('status') || 'open';
    document.getElementById('marketName').innerHTML = currentMarket;

    window.removeBid = removeBid;
    window.addHalfSangamA = addHalfSangamA;
    window.addHalfSangamB = addHalfSangamB;
    window.addFullSangam = addFullSangam;
    window.submitBids = submitBids;
    window.updatePoints = updatePoints;
    window.toggleDigit = toggleDigit;
    window.toggleJodi = toggleJodi;
    window.addSelectedNumbers = addSelectedNumbers;
    
    auth.onAuthStateChanged(async (user) => {
