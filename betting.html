<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DURGA - Place Bet</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; }
        .app-container { max-width: 500px; margin: 0 auto; background: #f0f2f5; min-height: 100vh; padding-bottom: 70px; }
        
        /* Header - Minimal */
        .header { background: #fff; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #e0e0e0; }
        .back-btn { background: none; border: none; font-size: 22px; color: #333; cursor: pointer; padding: 5px; }
        .market-name { flex: 1; font-size: 16px; font-weight: 600; color: #1a1a2e; }
        .balance { background: #e91e63; padding: 5px 12px; border-radius: 20px; color: #fff; font-size: 13px; font-weight: bold; }
        
        /* Game Selection - No Icons */
        .game-section { background: #fff; margin: 10px; border-radius: 12px; padding: 12px; }
        .section-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #e91e63; display: inline-block; }
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .game-btn { background: #f5f5f5; border: 1px solid #ddd; border-radius: 10px; padding: 10px 5px; text-align: center; font-size: 13px; font-weight: 500; color: #333; cursor: pointer; transition: 0.2s; }
        .game-btn.active { background: #e91e63; color: #fff; border-color: #e91e63; }
        
        /* Bet Type Toggle */
        .bet-section { background: #fff; margin: 10px; border-radius: 12px; padding: 10px; display: none; }
        .bet-toggle { display: flex; gap: 10px; }
        .bet-opt { flex: 1; padding: 8px; text-align: center; background: #f5f5f5; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #ddd; }
        .bet-opt.active.open { background: #28a745; color: #fff; border-color: #28a745; }
        .bet-opt.active.close { background: #ff9800; color: #fff; border-color: #ff9800; }
        
        /* Input Form */
        .form-section { background: #fff; margin: 10px; border-radius: 12px; padding: 12px; display: none; }
        .input-row { margin-bottom: 12px; }
        .input-row label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
        .input-row input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; text-align: center; background: #fff; }
        .input-row input:focus { outline: none; border-color: #e91e63; }
        
        /* Digit Grid */
        .digit-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 8px; }
        .digit-btn { background: #f5f5f5; border: 1px solid #ddd; border-radius: 10px; padding: 10px; text-align: center; font-size: 16px; font-weight: 600; cursor: pointer; }
        .digit-btn.selected { background: #e91e63; color: #fff; border-color: #e91e63; }
        
        /* Pana Grid */
        .pana-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; max-height: 220px; overflow-y: auto; }
        .pana-item { background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; padding: 8px; text-align: center; font-size: 12px; font-weight: 500; cursor: pointer; }
        .pana-item.selected { background: #e91e63; color: #fff; border-color: #e91e63; }
        .custom-item { background: #e91e63; color: #fff; border-color: #e91e63; }
        
        /* Add Button */
        .add-btn { width: calc(100% - 20px); margin: 0 10px 10px 10px; padding: 12px; background: #e91e63; border: none; border-radius: 30px; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; display: none; }
        
        /* Selected Bids List - Full View */
        .bids-section { background: #fff; margin: 10px; border-radius: 12px; padding: 10px; max-height: 250px; overflow-y: auto; }
        .bid-item { background: #f8f9fa; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; border-left: 3px solid #e91e63; }
        .bid-row { display: flex; justify-content: space-between; align-items: center; }
        .bid-number { font-weight: 700; font-size: 14px; color: #e91e63; }
        .bid-type { font-size: 10px; color: #888; margin-top: 3px; }
        .bid-points { font-size: 13px; font-weight: 600; color: #333; }
        .remove-bid { background: none; border: none; color: #dc3545; font-size: 18px; cursor: pointer; padding: 0 5px; }
        .empty-bids { text-align: center; color: #999; padding: 20px; font-size: 13px; }
        
        /* Summary Bar */
        .summary { background: #fff; margin: 10px; padding: 10px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .summary-text { font-size: 13px; color: #666; }
        .summary-value { font-size: 18px; font-weight: bold; color: #e91e63; }
        
        /* Submit Button */
        .submit-btn { width: calc(100% - 20px); margin: 0 10px 20px 10px; padding: 14px; background: #28a745; border: none; border-radius: 30px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; }
        .submit-btn:disabled { opacity: 0.6; }
        
        /* Message */
        .msg { margin: 10px; padding: 10px; border-radius: 10px; font-size: 12px; text-align: center; display: none; }
        .msg-success { background: #d4edda; color: #28a745; display: block; }
        .msg-error { background: #ffe0e0; color: #dc3545; display: block; }
        .msg-warning { background: #fff3cd; color: #856404; display: block; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: #fff; display: flex; justify-content: space-around; padding: 6px 8px; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: #888; cursor: pointer; font-size: 9px; flex: 1; }
        .nav-item img { width: 22px; height: 22px; display: block; margin: 0 auto 2px; opacity: 0.7; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header with Back, Market Name, Balance -->
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <span class="market-name" id="marketName">Loading...</span>
        <span class="balance">₹<span id="userBalance">0</span></span>
    </div>
    
    <!-- Game Selection -->
    <div class="game-section">
        <div class="section-title">Select Game</div>
        <div class="game-grid" id="gameGrid"></div>
    </div>
    
    <!-- Bet Type -->
    <div class="bet-section" id="betSection">
        <div class="bet-toggle">
            <div class="bet-opt open" onclick="setBetType('Open')">OPEN</div>
            <div class="bet-opt close" onclick="setBetType('Close')">CLOSE</div>
        </div>
    </div>
    
    <!-- Input Form -->
    <div class="form-section" id="formSection"></div>
    
    <!-- Add Button -->
    <button class="add-btn" id="addBtn" onclick="addToBids()">+ ADD MORE</button>
    
    <!-- Selected Bids List -->
    <div class="bids-section" id="bidsSection">
        <div class="empty-bids">No bets added yet</div>
    </div>
    
    <!-- Summary -->
    <div class="summary">
        <span class="summary-text">Total Bids / Amount</span>
        <span class="summary-value"><span id="bidCount">0</span> / ₹<span id="totalPoints">0</span></span>
    </div>
    
    <!-- Submit -->
    <button class="submit-btn" id="submitBtn" onclick="submitBids()">SUBMIT BETS</button>
    
    <div id="message" class="msg"></div>
    
    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="location.href='dashboard.html'"><img src="https://i.imgur.com/StGZq3Y.png"><span>Home</span></div>
        <div class="nav-item" onclick="location.href='mybids.html'"><img src="https://i.imgur.com/rUWwMYm.png"><span>Passbook</span></div>
        <div class="nav-item" onclick="location.href='funds.html'"><img src="https://i.imgur.com/NvJCTli.png"><span>Fund</span></div>
        <div class="nav-item" onclick="location.href='chat.html'"><img src="https://i.imgur.com/ug9IprL.jpeg"><span>Support</span></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38", authDomain: "win777-ed482.firebaseapp.com", projectId: "win777-ed482", storageBucket: "win777-ed482.firebasestorage.app", messagingSenderId: "843686112399", appId: "1:843686112399:web:9c20a96831e6a94cd814fa" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // Last Active Tracking
    function updateLastActive() {
        if (auth.currentUser) {
            db.collection('users').doc(auth.currentUser.uid).update({ lastActive: firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
        }
    }
    setInterval(updateLastActive, 30000);
    updateLastActive();
    document.addEventListener('visibilitychange', () => { if (!document.hidden) updateLastActive(); });
    
    let currentUser = null;
    let userData = null;
    let currentMarket = '';
    let currentMarketId = '';
    let currentAdminStatus = 'open';
    let currentGame = '';
    let currentBetType = 'Open';
    let bids = [];
    let marketOpenEndTime = null;
    let marketCloseEndTime = null;
    let selectedDigits = [];
    
    // Game Types
    const games = [
        'Single Digit', 'Single Digit Bulk', 'Jodi', 
        'Single Pana', 'Double Pana', 'Triple Pana',
        'Half Sangam A', 'Half Sangam B', 'Full Sangam'
    ];
    
    // Valid Pana Lists
    const validSinglePana = ['128','137','146','236','245','290','380','470','489','560','579','678','129','138','147','156','237','246','345','390','480','570','589','679','120','139','148','157','238','247','256','346','490','580','670','689','130','149','158','167','239','248','257','347','356','590','680','789','140','159','168','230','249','258','267','348','357','456','690','780','123','150','169','178','240','259','268','349','358','367','457','790','124','160','278','179','250','269','340','359','368','458','467','890','125','134','170','189','260','279','350','369','468','378','459','567','126','135','180','234','270','289','360','379','450','469','478','568','127','136','145','190','235','280','370','389','460','479','569','578'];
    const validDoublePana = ['100','119','155','227','335','344','399','588','669','110','200','228','255','366','499','660','688','778','166','229','300','337','355','445','599','779','788','112','220','266','338','400','446','455','699','770','113','122','177','339','366','447','500','799','889','600','114','277','330','448','466','556','880','899','115','133','188','223','377','449','557','566','700','116','224','233','288','440','477','558','800','990','117','144','199','225','388','559','577','667','900','118','226','244','299','334','488','550','668','677'];
    const validTriplePana = ['111','222','333','444','555','666','777','888','999','000'];
    
    // Get URL params
    const urlParams = new URLSearchParams(window.location.search);
    currentMarket = decodeURIComponent(urlParams.get('market') || 'Main Bazar');
    currentMarketId = urlParams.get('marketId') || '';
    currentAdminStatus = urlParams.get('status') || 'open';
    document.getElementById('marketName').innerHTML = currentMarket;
    
    async function init() {
        await loadUserData();
        await loadMarketData();
        renderGameGrid();
        updateBidsDisplay();
    }
    
    async function loadUserData() {
        const user = auth.currentUser;
        if (!user) { location.href = 'index.html'; return; }
        currentUser = user;
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists) {
            userData = doc.data();
            document.getElementById('userBalance').innerText = userData.balance || 0;
        }
    }
    
    async function loadMarketData() {
        if (!currentMarketId) return;
        const doc = await db.collection('markets').doc(currentMarketId).get();
        if (doc.exists) {
            const data = doc.data();
            marketOpenEndTime = timeToMinutes(data.openBidEnd);
            marketCloseEndTime = timeToMinutes(data.closeBidEnd);
        }
    }
    
    function timeToMinutes(t) { if (!t) return null; let [h,m]=t.split(':'); return parseInt(h)*60+parseInt(m); }
    
    async function checkBettingAllowed() {
        const serverTime = await getServerTime();
        const mins = serverTime.getHours()*60 + serverTime.getMinutes();
        if (currentAdminStatus === 'holiday') return { allowed: false, message: 'Market is on HOLIDAY!' };
        if (currentAdminStatus === 'open' && marketOpenEndTime && mins >= marketOpenEndTime) return { allowed: false, message: 'Open bidding time is over!' };
        if (currentAdminStatus === 'close' && marketCloseEndTime && mins >= marketCloseEndTime) return { allowed: false, message: 'Close bidding time is over!' };
        return { allowed: true, message: null };
    }
    
    async function getServerTime() {
        try {
            const docRef = db.collection('settings').doc('servertime');
            await docRef.set({ timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            const doc = await docRef.get();
            return doc.data().timestamp.toDate();
        } catch(e) { return new Date(); }
    }
    
    function renderGameGrid() {
        let html = '';
        games.forEach(game => {
            html += `<div class="game-btn" onclick="selectGame('${game}')">${game}</div>`;
        });
        document.getElementById('gameGrid').innerHTML = html;
    }
    
    function selectGame(game) {
        currentGame = game;
        document.querySelectorAll('.game-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        // Show/hide bet type
        const hideBet = ['Jodi', 'Half Sangam A', 'Half Sangam B', 'Full Sangam'];
        if (hideBet.includes(game) || currentAdminStatus === 'close') {
            document.getElementById('betSection').style.display = 'none';
            currentBetType = 'Close';
        } else {
            document.getElementById('betSection').style.display = 'block';
            if (currentAdminStatus === 'open') {
                currentBetType = 'Open';
                document.querySelectorAll('.bet-opt').forEach(opt => opt.classList.remove('active'));
                document.querySelector('.bet-opt.open').classList.add('active');
            }
        }
        
        renderForm();
        document.getElementById('formSection').style.display = 'block';
        document.getElementById('addBtn').style.display = 'block';
        selectedDigits = [];
    }
    
    function setBetType(type) {
        currentBetType = type;
        document.querySelectorAll('.bet-opt').forEach(opt => opt.classList.remove('active'));
        if (type === 'Open') document.querySelector('.bet-opt.open').classList.add('active');
        else document.querySelector('.bet-opt.close').classList.add('active');
        renderForm();
    }
    
    function renderForm() {
        const container = document.getElementById('formSection');
        let html = '';
        
        switch(currentGame) {
            case 'Single Digit':
                html = `<div class="input-row"><label>Points (Min ₹5)</label><input type="number" id="points" placeholder="Enter points" min="5" value="10"></div>
                        <div class="input-row"><label>Digit (0-9)</label><input type="text" id="digit" placeholder="Enter digit" maxlength="1" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>`;
                break;
            case 'Single Digit Bulk':
                html = `<div class="input-row"><label>Points (Min ₹5)</label><input type="number" id="points" placeholder="Enter points" min="5" value="10"></div>
                        <div class="digit-grid" id="digitGrid"></div>`;
                setTimeout(() => {
                    let dg = document.getElementById('digitGrid');
                    if(dg) { let h=''; for(let i=0;i<=9;i++) h+=`<div class="digit-btn" onclick="toggleDigit('${i}')">${i}</div>`; dg.innerHTML=h; }
                }, 10);
                break;
            case 'Jodi':
                html = `<div class="input-row"><label>Points (Min ₹5)</label><input type="number" id="points" placeholder="Enter points" min="5" value="10"></div>
                        <div class="input-row"><label>Jodi (00-99)</label><input type="text" id="jodi" placeholder="Enter Jodi" maxlength="2" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>`;
                break;
            case 'Single Pana':
                html = `<div class="input-row"><label>Points (Min ₹5)</label><input type="number" id="points" placeholder="Enter points" min="5" value="10"></div>
                        <div class="input-row"><label>Single Pana (3 digits)</label><input type="text" id="pana" placeholder="Enter 3-digit Pana" maxlength="3" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>`;
                break;
            case 'Double Pana':
                html = `<div class="input-row"><label>Points (Min ₹5)</label><input type="number" id="points" placeholder="Enter points" min="5" value="10"></div>
                        <div class="pana-grid" id="doubleGrid"></div>`;
                setTimeout(() => {
                    let dg = document.getElementById('doubleGrid');
                    if(dg) { let h=''; validDoublePana.slice(0,30).forEach(p=>h+=`<div class="pana-item" onclick="selectPana('${p}')">${p}</div>`); h+=`<div class="pana-item custom-item" onclick="customPana()">Custom</div>`; dg.innerHTML=h; }
                }, 10);
                break;
            case 'Triple Pana':
                html = `<div class="input-row"><label>Points (Min ₹5)</label><input type="number" id="points" placeholder="Enter points" min="5" value="10"></div>
                        <div class="pana-grid" id="tripleGrid"></div>`;
                setTimeout(() => {
                    let dg = document.getElementById('tripleGrid');
                    if(dg) { let h=''; validTriplePana.forEach(p=>h+=`<div class="pana-item" onclick="selectPana('${p}')">${p}</div>`); dg.innerHTML=h; }
                }, 10);
                break;
            case 'Half Sangam A':
                html = `<div class="input-row"><label>Points (Min ₹5)</label><input type="number" id="points" placeholder="Enter points" min="5" value="10"></div>
                        <div class="input-row"><label>Open Pana (3 digits)</label><input type="text" id="openPana" placeholder="Open Pana" maxlength="3" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>
                        <div class="input-row"><label>Close Digit (0-9)</label><input type="text" id="closeDigit" placeholder="Close Digit" maxlength="1" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>`;
                break;
            case 'Half Sangam B':
                html = `<div class="input-row"><label>Points (Min ₹5)</label><input type="number" id="points" placeholder="Enter points" min="5" value="10"></div>
                        <div class="input-row"><label>Open Digit (0-9)</label><input type="text" id="openDigit" placeholder="Open Digit" maxlength="1" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>
                        <div class="input-row"><label>Close Pana (3 digits)</label><input type="text" id="closePana" placeholder="Close Pana" maxlength="3" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>`;
                break;
            case 'Full Sangam':
                html = `<div class="input-row"><label>Points (Min ₹5)</label><input type="number" id="points" placeholder="Enter points" min="5" value="10"></div>
                        <div class="input-row"><label>Open Pana (3 digits)</label><input type="text" id="openPana" placeholder="Open Pana" maxlength="3" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>
                        <div class="input-row"><label>Close Pana (3 digits)</label><input type="text" id="closePana" placeholder="Close Pana" maxlength="3" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>`;
                break;
        }
        container.innerHTML = html;
    }
    
    function toggleDigit(d) {
        let idx = selectedDigits.indexOf(d);
        idx === -1 ? selectedDigits.push(d) : selectedDigits.splice(idx,1);
        let btns = document.querySelectorAll('.digit-btn');
        btns.forEach(btn => {
            if(btn.innerText === d) btn.classList.toggle('selected');
        });
    }
    
    function selectPana(pana) {
        let pts = document.getElementById('points')?.value;
        if(!pts || pts<5) { showMessage('Enter points (Min ₹5)', 'error'); return; }
        addToBids(currentGame, pana, parseInt(pts), currentBetType);
        showMessage(`Added ${pana} with ₹${pts}`, 'success');
    }
    
    function customPana() {
        let val = prompt('Enter Pana number (3 digits):');
        if(val && /^\d{3}$/.test(val) && validDoublePana.includes(val)) {
            selectPana(val);
        } else { showMessage('Invalid Double Pana!', 'error'); }
    }
    
    function addToBids() {
        let pts = parseInt(document.getElementById('points')?.value);
        if(isNaN(pts) || pts<5) { showMessage('Enter valid points (Min ₹5)', 'error'); return; }
        
        switch(currentGame) {
            case 'Single Digit':
                let digit = document.getElementById('digit')?.value.trim();
                if(!digit || !/^\d$/.test(digit)) { showMessage('Enter valid digit', 'error'); return; }
                addToBidsList(currentGame, digit, pts, currentBetType);
                document.getElementById('digit').value = '';
                break;
            case 'Single Digit Bulk':
                if(selectedDigits.length === 0) { showMessage('Select at least one digit', 'error'); return; }
                selectedDigits.forEach(d => addToBidsList(currentGame, d, pts, currentBetType));
                selectedDigits = [];
                renderForm();
                showMessage(`Added ${selectedDigits.length} digits`, 'success');
                break;
            case 'Jodi':
                let jodi = document.getElementById('jodi')?.value.trim();
                if(!jodi || !/^\d{2}$/.test(jodi)) { showMessage('Enter valid Jodi (00-99)', 'error'); return; }
                addToBidsList(currentGame, jodi, pts, 'Close');
                document.getElementById('jodi').value = '';
                break;
            case 'Single Pana':
                let pana = document.getElementById('pana')?.value.trim();
                if(!pana || !/^\d{3}$/.test(pana)) { showMessage('Enter valid 3-digit Pana', 'error'); return; }
                if(!validSinglePana.includes(pana)) { showMessage('Invalid Single Pana!', 'error'); return; }
                addToBidsList(currentGame, pana, pts, currentBetType);
                document.getElementById('pana').value = '';
                break;
            case 'Half Sangam A':
                let op = document.getElementById('openPana')?.value.trim();
                let cd = document.getElementById('closeDigit')?.value.trim();
                if(!op || !/^\d{3}$/.test(op) || !cd || !/^\d$/.test(cd)) { showMessage('Enter valid Open Pana and Close Digit', 'error'); return; }
                addToBidsList(currentGame, `${op}-${cd}`, pts, 'Close');
                document.getElementById('openPana').value = '';
                document.getElementById('closeDigit').value = '';
                break;
            case 'Half Sangam B':
                let od = document.getElementById('openDigit')?.value.trim();
                let cp = document.getElementById('closePana')?.value.trim();
                if(!od || !/^\d$/.test(od) || !cp || !/^\d{3}$/.test(cp)) { showMessage('Enter valid Open Digit and Close Pana', 'error'); return; }
                addToBidsList(currentGame, `${od}-${cp}`, pts, 'Close');
                document.getElementById('openDigit').value = '';
                document.getElementById('closePana').value = '';
                break;
            case 'Full Sangam':
                let op1 = document.getElementById('openPana')?.value.trim();
                let cp1 = document.getElementById('closePana')?.value.trim();
                if(!op1 || !/^\d{3}$/.test(op1) || !cp1 || !/^\d{3}$/.test(cp1)) { showMessage('Enter valid Open Pana and Close Pana', 'error'); return; }
                addToBidsList(currentGame, `${op1}-${cp1}`, pts, 'Close');
                document.getElementById('openPana').value = '';
                document.getElementById('closePana').value = '';
                break;
        }
        document.getElementById('points').value = '10';
        updateBidsDisplay();
    }
    
    function addToBidsList(game, val, pts, type) {
        let existing = bids.findIndex(b => b.game === game && b.value === val && b.betType === type);
        existing !== -1 ? bids[existing].points += pts : bids.push({ game, value: val, points: pts, betType: type, market: currentMarket, marketId: currentMarketId });
        updateBidsDisplay();
    }
    
    function updateBidsDisplay() {
        let container = document.getElementById('bidsSection');
        let total = 0;
        if(bids.length === 0) {
            container.innerHTML = '<div class="empty-bids">No bets added yet</div>';
            document.getElementById('bidCount').innerText = '0';
            document.getElementById('totalPoints').innerText = '0';
            return;
        }
        let html = '';
        bids.forEach((b, i) => {
            total += b.points;
            html += `<div class="bid-item">
                        <div class="bid-row">
                            <span class="bid-number">${b.value}</span>
                            <span class="bid-points">₹${b.points}</span>
                            <button class="remove-bid" onclick="removeBid(${i})">✕</button>
                        </div>
                        <div class="bid-type">${b.game} ${b.betType === 'Open' ? 'OPEN' : 'CLOSE'}</div>
                    </div>`;
        });
        container.innerHTML = html;
        document.getElementById('bidCount').innerText = bids.length;
        document.getElementById('totalPoints').innerText = total;
    }
    
    function removeBid(i) { bids.splice(i,1); updateBidsDisplay(); showMessage('Bet removed', 'success'); }
    
    async function submitBids() {
        if(bids.length === 0) { showMessage('No bets to place!', 'error'); return; }
        let allowed = await checkBettingAllowed();
        if(!allowed.allowed) { showMessage(allowed.message, 'error'); return; }
        let total = bids.reduce((s,b)=>s+b.points,0);
        let fresh = await db.collection('users').doc(currentUser.uid).get();
        let balance = fresh.data()?.balance || 0;
        if(balance < total) { showMessage(`Insufficient balance! Need ₹${total}`, 'error'); return; }
        
        let btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = 'Processing...';
        try {
            let batch = db.batch();
            batch.update(db.collection('users').doc(currentUser.uid), { balance: balance - total });
            for(let b of bids) {
                batch.set(db.collection('bids').doc(), {
                    userId: currentUser.uid, market: b.market, marketId: b.marketId,
                    gameType: b.game, bidType: b.betType, value: b.value, points: b.points,
                    status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            batch.set(db.collection('transactions').doc(), {
                userId: currentUser.uid, type: 'debit', amount: total, status: 'Completed',
                description: `Bets on ${currentMarket} (${bids.length} bets)`,
                date: firebase.firestore.FieldValue.serverTimestamp()
            });
            await batch.commit();
            document.getElementById('userBalance').innerText = balance - total;
            showMessage(`✅ ₹${total} placed! ${bids.length} bet(s) active.`, 'success');
            bids = [];
            updateBidsDisplay();
            setTimeout(() => goBack(), 2000);
        } catch(e) { showMessage('Error: '+e.message, 'error'); }
        finally { btn.disabled = false; btn.innerText = 'SUBMIT BETS'; }
    }
    
    function showMessage(msg, type) {
        let d = document.getElementById('message');
        d.innerText = msg;
        d.className = `msg msg-${type}`;
        setTimeout(() => { d.className = 'msg'; d.innerText = ''; }, 3000);
    }
    
    function goBack() { location.href = 'dashboard.html'; }
    
    window.selectGame = selectGame;
    window.setBetType = setBetType;
    window.toggleDigit = toggleDigit;
    window.selectPana = selectPana;
    window.customPana = customPana;
    window.addToBids = addToBids;
    window.removeBid = removeBid;
    window.submitBids = submitBids;
    window.goBack = goBack;
    
    auth.onAuthStateChanged(user => { if(!user) location.href='index.html'; else init(); });
</script>
</body>
</html>
