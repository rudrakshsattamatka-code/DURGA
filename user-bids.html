<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DURGA - User Bid Details</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f7fa; padding-bottom: 20px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
        .header { background: #fff; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #eee; }
        .header h1 { color: #1a1a2e; font-size: 18px; margin-bottom: 5px; }
        .header p { color: #888; font-size: 13px; }
        .back-btn { background: linear-gradient(135deg, #e91e63, #9c27b0); color: #fff; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #fff; padding: 12px; border-radius: 16px; text-align: center; border: 1px solid #eee; }
        .stat-card .label { color: #888; font-size: 11px; margin-bottom: 4px; }
        .stat-card .value { color: #1a1a2e; font-size: 22px; font-weight: bold; }
        .stat-card .value.positive { color: #28a745; }
        .stat-card .value.negative { color: #dc3545; }
        .filters { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .filter-select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; }
        .search-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; min-width: 180px; }
        .refresh-btn { background: #17a2b8; color: #fff; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .bids-table { background: #fff; border-radius: 16px; overflow-x: auto; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: bold; color: #1a1a2e; border-bottom: 1px solid #eee; font-size: 13px; }
        td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; color: #555; font-size: 13px; }
        tr:hover { background: #f8f9fa; }
        .status-won { color: #28a745; font-weight: bold; }
        .status-lost { color: #dc3545; font-weight: bold; }
        .status-pending { color: #ff9800; font-weight: bold; }
        .bid-type-open { background: #d4edda; color: #155724; padding: 2px 6px; border-radius: 10px; font-size: 10px; display: inline-block; }
        .bid-type-close { background: #fff3cd; color: #856404; padding: 2px 6px; border-radius: 10px; font-size: 10px; display: inline-block; }
        .no-data { text-align: center; padding: 30px; color: #888; }
        @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); } th, td { padding: 8px; font-size: 11px; } }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="window.close()">← Close Window</button>
    <div class="header"><h1 id="userName">Loading...</h1><p id="userPhone">📞 Phone: Loading...</p><p id="userBalance">💰 Balance: ₹0</p></div>
    <div class="stats"><div class="stat-card"><div class="label">Total Bids</div><div class="value" id="totalBids">0</div></div><div class="stat-card"><div class="label">Total Spent</div><div class="value" id="totalSpent">₹0</div></div><div class="stat-card"><div class="label">Total Won</div><div class="value positive" id="totalWon">₹0</div></div><div class="stat-card"><div class="label">Net Profit/Loss</div><div class="value" id="netProfit">₹0</div></div></div>
    <div class="filters"><select id="statusFilter" class="filter-select" onchange="filterBids()"><option value="all">All Status</option><option value="won">Won</option><option value="lost">Lost</option><option value="pending">Pending</option></select><select id="gameTypeFilter" class="filter-select" onchange="filterBids()"><option value="all">All Games</option><option value="Single Digit">Single Digit</option><option value="Jodi">Jodi</option><option value="Single Pana">Single Pana</option><option value="Double Pana">Double Pana</option><option value="Triple Pana">Triple Pana</option><option value="Half Sangam A">Half Sangam A</option><option value="Half Sangam B">Half Sangam B</option><option value="Full Sangam">Full Sangam</option></select><input type="text" id="searchInput" class="search-input" placeholder="🔍 Search market or number..." onkeyup="filterBids()"><button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button></div>
    <div class="bids-table"><table><thead><tr><th>Date & Time</th><th>Market</th><th>Bid Type</th><th>Game</th><th>Number</th><th>Points</th><th>Rate</th><th>Possible Win</th><th>Status</th></tr></thead><tbody id="bidsList"><tr><td colspan="9" class="no-data">Loading bids...</td></tr></tbody></table></div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38", authDomain: "win777-ed482.firebaseapp.com", projectId: "win777-ed482", storageBucket: "win777-ed482.firebasestorage.app", messagingSenderId: "843686112399", appId: "1:843686112399:web:9c20a96831e6a94cd814fa" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const gameRates = { 'Single Digit':10, 'Jodi':100, 'Single Pana':160, 'Double Pana':320, 'Triple Pana':1000, 'Half Sangam A':1000, 'Half Sangam B':1000, 'Full Sangam':10000 };
    let allBids = [], userId = null, userName = "";
    
    const urlParams = new URLSearchParams(window.location.search);
    userId = urlParams.get('uid');
    userName = urlParams.get('name') || 'User';
    if (userId) { document.getElementById('userName').innerHTML = `🌸 Bid History: ${escapeHtml(userName)}`; init(); }
    else { document.getElementById('userName').innerHTML = '❌ No User Selected'; document.getElementById('bidsList').innerHTML = '<tr><td colspan="9" class="no-data">No user ID provided</td></tr>'; }
    
    async function init() { await loadUserData(); await loadBids(); listenToBidUpdates(); }
    async function loadUserData() { if(!userId) return; try { let userDoc = await db.collection('users').doc(userId).get(); if(userDoc.exists) { let ud=userDoc.data(); document.getElementById('userPhone').innerHTML = `📞 Phone: ${ud.phone || 'Not provided'}`; document.getElementById('userBalance').innerHTML = `💰 Balance: ₹${(ud.balance || 0).toLocaleString()}`; } } catch(e) { console.error(e); } }
    async function loadBids() { if(!userId) return; document.getElementById('bidsList').innerHTML = '<tr><td colspan="9" class="no-data">Loading...</td></tr>'; try { let snapshot = await db.collection('bids').where('userId', '==', userId).get(); allBids = []; snapshot.forEach(doc => { let b = doc.data(); let bidDate = b.createdAt?.toDate ? b.createdAt.toDate() : (b.createdAt?.seconds ? new Date(b.createdAt.seconds*1000) : new Date(0)); allBids.push({ id: doc.id, ...b, dateObj: bidDate, bidType: b.bidType || null }); }); allBids.sort((a,b) => b.dateObj - a.dateObj); if(allBids.length===0) document.getElementById('bidsList').innerHTML = '<tr><td colspan="9" class="no-data">No bids found for this user</td></tr>'; updateStats(); filterBids(); } catch(e) { document.getElementById('bidsList').innerHTML = `<tr><td colspan="9" class="no-data">❌ Error: ${e.message}</td></tr>`; } }
    function filterBids() { let status=document.getElementById('statusFilter').value, game=document.getElementById('gameTypeFilter').value, search=document.getElementById('searchInput').value.trim().toLowerCase(); let filtered = [...allBids]; if(status!=='all') filtered = filtered.filter(b=>b.status===status); if(game!=='all') filtered = filtered.filter(b=>b.gameType===game); if(search) filtered = filtered.filter(b=>(b.market||'').toLowerCase().includes(search) || (b.value||'').toLowerCase().includes(search)); displayBidsTable(filtered); }
    function displayBidsTable(bids){ let tbody=document.getElementById('bidsList'); if(bids.length===0){ tbody.innerHTML='<tr><td colspan="9" class="no-data">No bids match your filters</td></tr>'; return; } let html=''; for(let b of bids){ let dateStr=b.dateObj && b.dateObj.getTime()>0 ? b.dateObj.toLocaleString() : 'Unknown'; let rate=gameRates[b.gameType]||10; let possibleWin=(b.points||0)*rate; let statusClass=b.status==='won'?'status-won':(b.status==='lost'?'status-lost':'status-pending'); let statusText=b.status ? b.status.toUpperCase() : 'PENDING'; let bidTypeBadge=b.bidType ? (b.bidType==='Open'? '<span class="bid-type-open">🟢 OPEN</span>' : '<span class="bid-type-close">🟡 CLOSE</span>') : '<span style="color:#888;">—</span>'; html+=`<tr><td>${dateStr}</td><td>${escapeHtml(b.market||'Unknown')}</td><td>${bidTypeBadge}</td><td>${escapeHtml(b.gameType||'-')}</td><td><strong>${escapeHtml(b.value||'-')}</strong></td><td>₹${(b.points||0).toLocaleString()}</td><td>${rate}x</td><td>₹${possibleWin.toLocaleString()}</td><td class="${statusClass}">${statusText}</td></tr>`; } tbody.innerHTML=html; }
    function updateStats(){ let total=allBids.length, spent=0, won=0; for(let b of allBids){ spent+=b.points||0; if(b.status==='won'){ let rate=gameRates[b.gameType]||10; won+=(b.points||0)*rate; } } let net=won-spent; document.getElementById('totalBids').innerHTML=total; document.getElementById('totalSpent').innerHTML=`₹${spent.toLocaleString()}`; document.getElementById('totalWon').innerHTML=`₹${won.toLocaleString()}`; let netEl=document.getElementById('netProfit'); netEl.innerHTML=`₹${net.toLocaleString()}`; netEl.className='value '+(net>0?'positive':(net<0?'negative':'')); }
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
    async function refreshData(){ await loadUserData(); await loadBids(); }
    function listenToBidUpdates(){ if(!userId) return; db.collection('bids').where('userId','==',userId).onSnapshot(()=>{ loadBids(); }); }
    window.filterBids=filterBids; window.refreshData=refreshData;
</script>
</body>
</html>
