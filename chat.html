<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DURGA - Live Support Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html, body {
            height: 100%;
            background: #1a1a2e;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #fff;
            border-top: 4px solid #e91e63;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chat-header {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .back-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            width: 40px;
            height: 40px;
        }
        .chat-title {
            flex: 1;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }
        .status {
            font-size: 10px;
            color: #00e676;
            margin-top: 2px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #1a1a2e;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
            word-wrap: break-word;
        }
        .user-message {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .support-message {
            background: #2a2a3e;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 9px;
            margin-top: 5px;
            opacity: 0.7;
        }
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 5px;
            cursor: pointer;
        }
        .welcome-msg {
            background: #2a2a3e;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin: 20px;
        }
        .welcome-msg h3 {
            color: #e91e63;
            margin-bottom: 8px;
        }
        .welcome-msg p {
            color: #aaa;
            font-size: 12px;
        }

        .typing-indicator {
            color: #aaa;
            font-size: 11px;
            padding: 6px 12px;
            font-style: italic;
            background: #1a1a2e;
            flex-shrink: 0;
        }

        .chat-input-area {
            background: #2a2a3e;
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            align-items: center;
            border-top: 1px solid #e91e63;
            min-height: 60px;
        }
        .image-btn {
            background: #1a1a2e;
            border: 1px solid #e91e63;
            border-radius: 30px;
            padding: 10px 14px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            min-width: 44px;
            min-height: 44px;
        }
        .chat-input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #e91e63;
            border-radius: 30px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            min-height: 44px;
        }
        .chat-input:focus {
            border-color: #fff;
        }
        .chat-input::placeholder {
            color: #888;
        }
        .send-btn {
            background: linear-gradient(135deg, #e91e63, #9c27b0);
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            min-width: 70px;
            min-height: 44px;
        }

        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="chat-title">
            DURGA SUPPORT<br>
            <span class="status">🔒 Online 24/7</span>
        </div>
        <div style="width: 40px;"></div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="welcome-msg">
            <h3>🌸 Welcome to DURGA Support!</h3>
            <p>Our team is available 24/7 to assist you.<br>Send a message and we'll respond shortly.</p>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator" style="display: none;">🌸 Support is typing...</div>

    <div class="chat-input-area">
        <button class="image-btn" onclick="document.getElementById('imageInput').click()">📷</button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(this)">
        <input type="text" class="chat-input" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <span class="image-modal-close">✕</span>
        <img id="modalImage" src="">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38",
            authDomain: "win777-ed482.firebaseapp.com",
            projectId: "win777-ed482",
            storageBucket: "win777-ed482.firebasestorage.app",
            messagingSenderId: "843686112399",
            appId: "1:843686112399:web:9c20a96831e6a94cd814fa"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        function showLoader() {
            let div = document.createElement('div');
            div.className = 'loader-overlay';
            div.id = 'pageLoader';
            div.innerHTML = '<div class="loader-spinner"></div>';
            document.body.appendChild(div);
        }
        function hideLoader() {
            let el = document.getElementById('pageLoader');
            if (el) el.remove();
        }

        let currentUser = null;
        let currentUserData = null;
        let chatRoomId = null;

        showLoader();
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            await loadUserData();
            setupChat();
            hideLoader();
        });

        async function loadUserData() {
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    currentUserData = doc.data();
                    chatRoomId = `chat_${currentUser.uid}`;
                    
                    await db.collection('chats').doc(chatRoomId).set({
                        userId: currentUser.uid,
                        userName: currentUserData?.name || 'User',
                        userPhone: currentUserData?.phone || '',
                        lastActive: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
            } catch (e) {
                console.error("Error loading user:", e);
            }
        }

        function setupChat() {
            if (!chatRoomId) return;

            db.collection('chats').doc(chatRoomId).collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const container = document.getElementById('chatMessages');
                    if (snapshot.empty) return;
                    
                    let html = '';
                    snapshot.forEach(doc => {
                        const msg = doc.data();
                        const isUser = msg.senderId === currentUser.uid;
                        const time = msg.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || '';
                        
                        if (msg.type === 'image') {
                            html += `<div class="message ${isUser ? 'user-message' : 'support-message'}">
                                <img src="${msg.imageUrl}" class="message-image" onclick="showImageModal('${msg.imageUrl}')">
                                <div class="message-time">${time}</div>
                            </div>`;
                        } else {
                            html += `<div class="message ${isUser ? 'user-message' : 'support-message'}">
                                ${escapeHtml(msg.text)}
                                <div class="message-time">${time}</div>
                            </div>`;
                        }
                    });
                    container.innerHTML = html;
                    container.scrollTop = container.scrollHeight;
                });

            db.collection('chats').doc(chatRoomId).onSnapshot((doc) => {
                const typingDiv = document.getElementById('typingIndicator');
                typingDiv.style.display = (doc.exists && doc.data().adminTyping) ? 'block' : 'none';
            });
        }

        async function sendMessage() {
            if (!chatRoomId) {
                alert("Please wait, connecting...");
                return;
            }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            
            try {
                await db.collection('chats').doc(chatRoomId).collection('messages').add({
                    senderId: currentUser.uid,
                    senderName: currentUserData?.name || 'User',
                    text: text,
                    type: 'text',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    isUser: true
                });
                await db.collection('chats').doc(chatRoomId).set({
                    lastMessage: text,
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                    unread: true
                }, { merge: true });
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        async function sendImage(input) {
            if (!chatRoomId) {
                alert("Please wait, connecting...");
                return;
            }
            
            const file = input.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('Image too large! Max 5MB');
                return;
            }

            const btn = document.querySelector('.image-btn');
            btn.disabled = true;
            btn.innerHTML = '⏳';

            try {
                const filename = `${Date.now()}_${file.name}`;
                const storageRef = storage.ref(`chat_images/${chatRoomId}/${filename}`);
                
                const snapshot = await storageRef.put(file);
                const imageUrl = await snapshot.ref.getDownloadURL();

                await db.collection('chats').doc(chatRoomId).collection('messages').add({
                    senderId: currentUser.uid,
                    senderName: currentUserData?.name || 'User',
                    imageUrl: imageUrl,
                    type: 'image',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    isUser: true
                });
                await db.collection('chats').doc(chatRoomId).set({
                    lastMessage: '📷 Image sent',
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                    unread: true
                }, { merge: true });
                
                alert('✅ Image sent!');
            } catch (e) {
                console.error("Error:", e);
                if (e.code === 'storage/unauthorized') {
                    alert('❌ Storage permission denied!\n\nPlease contact admin to update Firebase Storage rules.');
                } else {
                    alert("Error: " + e.message);
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📷';
                input.value = '';
            }
        }

        function showImageModal(url) {
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        let typingTimeout;
        document.getElementById('messageInput').addEventListener('input', () => {
            if (!chatRoomId) return;
            db.collection('chats').doc(chatRoomId).update({ userTyping: true }).catch(() => {});
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (chatRoomId) db.collection('chats').doc(chatRoomId).update({ userTyping: false }).catch(() => {});
            }, 1000);
        });

        window.sendMessage = sendMessage;
        window.goBack = goBack;
        window.sendImage = sendImage;
        window.showImageModal = showImageModal;
        window.closeImageModal = closeImageModal;
    </script>
</body>
</html>
