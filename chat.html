<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DURGA - Live Support Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        html, body { height: 100%; background: #0f172a; }
        body { display: flex; flex-direction: column; overflow: hidden; position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; }

        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .loader-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Compact Premium Support Bar Layout */
        .chat-header {
            background: #0f172a;
            padding: 0 16px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
            z-index: 1000;
        }
        .back-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .header-meta-box {
            flex: 1;
            margin-left: 14px;
            display: flex;
            flex-direction: column;
        }
        .chat-title {
            color: #f8fafc;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .status {
            font-size: 11px;
            color: #10b981;
            font-weight: 600;
            margin-top: 1px;
        }

        /* Message Stream Elements Section */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f172a;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
        }
        .user-message {
            background: #3b82f6;
            color: #fff;
            align-self: flex-end;
        }
        .support-message {
            background: #1e293b;
            color: #f1f5f9;
            align-self: flex-start;
        }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.6;
            align-self: flex-end;
            font-family: monospace;
        }
        .message-image {
            max-width: 100%;
            max-height: 220px;
            border-radius: 6px;
            margin-top: 2px;
            object-fit: cover;
            cursor: pointer;
        }
        
        .welcome-msg {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px 16px;
            text-align: center;
            margin: 10px 4px 20px 4px;
            border: 1px dashed #334155;
        }
        .welcome-msg h3 {
            color: #f8fafc;
            margin-bottom: 6px;
            font-size: 16px;
            font-weight: 700;
        }
        .welcome-msg p {
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.5;
        }

        .typing-indicator {
            color: #94a3b8;
            font-size: 12px;
            padding: 8px 16px;
            font-style: italic;
            background: #0f172a;
            flex-shrink: 0;
            font-weight: 500;
        }

        /* Borderless Active Chat Console Input Panel */
        .chat-input-area {
            background: #1e293b;
            padding: 10px 14px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            align-items: center;
            min-height: 64px;
        }
        .image-btn {
            background: #334155;
            border: none;
            border-radius: 8px;
            width: 42px;
            height: 42px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .chat-input-field {
            flex: 1;
            background: #0f172a;
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            height: 42px;
        }
        .chat-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
        }
        .chat-input::placeholder { color: #475569; }
        
        .send-btn {
            background: #22c55e;
            border: none;
            border-radius: 8px;
            height: 42px;
            padding: 0 18px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .send-btn:active { background: #16a34a; }

        /* Media Modal View Stack Overlay */
        .image-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(4px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .image-modal img { max-width: 90%; max-height: 85%; border-radius: 8px; }
        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <div class="chat-header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-meta-box">
            <span class="chat-title">DURGA SUPPORT</span>
            <span class="status">Online Support</span>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="welcome-msg">
            <h3>Welcome to DURGA Support!</h3>
            <p>Our team is available 24/7 to assist you.<br>Send a message and we will respond shortly.</p>
        </div>
    </div>

    <div class="typing-indicator" id="typingIndicator" style="display: none;">Support assistant is typing...</div>

    <div class="chat-input-area">
        <button class="image-btn" onclick="document.getElementById('imageInput').click()">📷</button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(this)">
        <div class="chat-input-field">
            <input type="text" class="chat-input" id="messageInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <span class="image-modal-close">✕</span>
        <img id="modalImage" src="">
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBeGpb7V0i5GN1opY9JECHxQIGvHFDPX38", authDomain: "win777-ed482.firebaseapp.com", projectId: "win777-ed482", storageBucket: "win777-ed482.firebasestorage.app", messagingSenderId: "843686112399", appId: "1:843686112399:web:9c20a96831e6a94cd814fa" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        function showLoader() {
            let div = document.createElement('div'); div.className = 'loader-overlay'; div.id = 'pageLoader'; 
            div.innerHTML = '<div class="loader-spinner"></div>'; document.body.appendChild(div);
        }
        function hideLoader() { let el = document.getElementById('pageLoader'); if (el) el.remove(); }

        let currentUser = null, currentUserData = null, chatRoomId = null;

        showLoader();
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUser = user;
            await loadUserData();
            setupChat();
            hideLoader();
        });

        async function loadUserData() {
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    currentUserData = doc.data();
                    chatRoomId = `chat_${currentUser.uid}`;
                    await db.collection('chats').doc(chatRoomId).set({
                        userId: currentUser.uid, userName: currentUserData?.name || 'User', userPhone: currentUserData?.phone || '', lastActive: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
            } catch (e) { console.error("Error loading user context:", e); }
        }

        function setupChat() {
            if (!chatRoomId) return;
            db.collection('chats').doc(chatRoomId).collection('messages').orderBy('timestamp', 'asc').onSnapshot((snapshot) => {
                const container = document.getElementById('chatMessages');
                if (snapshot.empty) return;
                
                let html = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isUser = msg.senderId === currentUser.uid;
                    const time = msg.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || '';
                    
                    if (msg.type === 'image') {
                        html += `<div class="message ${isUser ? 'user-message' : 'support-message'}">
                                    <img src="${msg.imageUrl}" class="message-image" onclick="showImageModal('${msg.imageUrl}')">
                                    <div class="message-time">${time}</div>
                                </div>`;
                    } else {
                        html += `<div class="message ${isUser ? 'user-message' : 'support-message'}">
                                    ${escapeHtml(msg.text)}
                                    <div class="message-time">${time}</div>
                                </div>`;
                    }
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });

            // FIXED: Wipes out 'adminUnread' flag explicitly so the dashboard turns off the popup/dot instantly
            db.collection('chats').doc(chatRoomId).onSnapshot((doc) => {
                if (doc.exists) {
                    document.getElementById('typingIndicator').style.display = doc.data().adminTyping ? 'block' : 'none';
                    if (doc.data().adminUnread === true) {
                        db.collection('chats').doc(chatRoomId).update({ adminUnread: false }).catch(() => {});
                    }
                }
            });
        }

        async function sendMessage() {
            if (!chatRoomId) { alert("Please wait, establishing secure sockets..."); return; }
            const input = document.getElementById('messageInput');
            const text = input.value.trim(); if (!text) return;
            input.value = '';
            
            try {
                await db.collection('chats').doc(chatRoomId).collection('messages').add({
                    senderId: currentUser.uid, senderName: currentUserData?.name || 'User', text: text, type: 'text', timestamp: firebase.firestore.FieldValue.serverTimestamp(), isUser: true
                });
                await db.collection('chats').doc(chatRoomId).set({ lastMessage: text, lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(), unread: true }, { merge: true });
            } catch (e) { alert("Transaction error: " + e.message); }
        }

        async function sendImage(input) {
            if (!chatRoomId) { alert("Please wait, establishing secure sockets..."); return; }
            const file = input.files[0]; if (!file) return;
            if (!file.type.startsWith('image/')) { alert('Select standard imagery formats'); return; }
            if (file.size > 5 * 1024 * 1024) { alert('Compressed file footprint must fall under 5MB'); return; }

            const btn = document.querySelector('.image-btn');
            btn.disabled = true; btn.innerHTML = '..';

            try {
                const filename = `${Date.now()}_${file.name}`;
                const storageRef = storage.ref(`chat_images/${chatRoomId}/${filename}`);
                const snapshot = await storageRef.put(file);
                const imageUrl = await snapshot.ref.getDownloadURL();

                await db.collection('chats').doc(chatRoomId).collection('messages').add({
                    senderId: currentUser.uid, senderName: currentUserData?.name || 'User', imageUrl: imageUrl, type: 'image', timestamp: firebase.firestore.FieldValue.serverTimestamp(), isUser: true
                });
                await db.collection('chats').doc(chatRoomId).set({ lastMessage: '📷 Media Attachment', lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(), unread: true }, { merge: true });
            } catch (e) { alert("Upload rejection fault encountered."); } 
            finally { btn.disabled = false; btn.innerHTML = '📷'; input.value = ''; }
        }

        function showImageModal(url) { document.getElementById('modalImage').src = url; document.getElementById('imageModal').style.display = 'flex'; }
        function closeImageModal() { document.getElementById('imageModal').style.display = 'none'; }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
        function goBack() { window.location.href = 'dashboard.html'; }

        let typingTimeout;
        document.getElementById('messageInput').addEventListener('input', () => {
            if (!chatRoomId) return;
            db.collection('chats').doc(chatRoomId).update({ userTyping: true }).catch(() => {});
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (chatRoomId) db.collection('chats').doc(chatRoomId).update({ userTyping: false }).catch(() => {});
            }, 1000);
        });

        window.sendMessage = sendMessage; window.goBack = goBack; window.sendImage = sendImage; window.showImageModal = showImageModal; window.closeImageModal = closeImageModal;
    </script>
</body>
</html>
